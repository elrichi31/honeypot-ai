x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  cowrie:
    <<: *service-defaults
    logging: *json-logging
    cap_add:
      - SETUID
      - SETGID
    build:
      context: ./sensors/cowrie
    container_name: cowrie
    ports:
      - "22:2222"
      - "2222:2222"
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var
      - cowrie_signal:/signal
    networks:
      edge:
      honeypot_ingest:
      deception_net:
        ipv4_address: 10.0.1.100
    deploy:
      resources:
        limits:
          cpus: "0.5"
          pids: 256

  cowrie-beacon:
    <<: *service-defaults
    logging: *json-logging
    image: python:3.12-alpine
    container_name: cowrie-beacon
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      SENSOR_ID: ${SENSOR_ID_SSH:-cowrie-ssh-01}
      SENSOR_NAME: SSH Honeypot (Cowrie)
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_PROTOCOL: ssh
      SENSOR_VERSION: cowrie
      SENSOR_PORTS: "22 2222"
      SENSOR_PROBE_PORTS: "2222 2222"
      SENSOR_HOST: cowrie
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      SIGNAL_DIR: /signal
    volumes:
      - ./sensors/cowrie/heartbeat.py:/heartbeat.py:ro
      - cowrie_signal:/signal
    command: ["python3", "/heartbeat.py"]
    networks:
      - honeypot_ingest
    deploy:
      resources:
        limits:
          cpus: "0.1"
          pids: 16

  web-honeypot:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./sensors/web-honeypot
    container_name: web-honeypot
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "8080"
      SENSOR_ID: ${SENSOR_ID_HTTP:-web-01}
      SENSOR_NAME: Web Honeypot
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_HOST: web-honeypot
      SENSOR_PORTS: "80 8443"
      SENSOR_PROBE_PORTS: "8080 8080"
    ports:
      - "80:8080"
      - "8443:8080"
    read_only: true
    networks:
      - edge
      - honeypot_ingest
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.3"
          pids: 128

  postgres:
    logging: *json-logging
    image: postgres:16-alpine
    container_name: honeypot-postgres
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=32MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c max_connections=50
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: honeypot_prod
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - db_private
    deploy:
      resources:
        limits:
          cpus: "2.0"

  pgbouncer:
    image: bitnami/pgbouncer:1
    container_name: honeypot-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: honeypot
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_DATABASE: honeypot_prod
      PGBOUNCER_DATABASE: honeypot_prod
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 15
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits
    networks:
      - db_private
    deploy:
      resources:
        limits:
          cpus: "0.2"
          pids: 64

  redis:
    logging: *json-logging
    image: redis:7-alpine
    container_name: honeypot-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - db_private
    deploy:
      resources:
        limits:
          cpus: "0.5"

  ingest-api:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./apps/ingest-api
      dockerfile: Dockerfile.compose
    container_name: ingest-api
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@pgbouncer:5432/honeypot_prod?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      HOST: "0.0.0.0"
      DIONAEA_BINARIES_PATH: /dionaea/binaries
      SURICATA_OWN_IPS: ${SURICATA_OWN_IPS:-}
    group_add:
      - "112"
    volumes:
      - dashboard_data:/app/data
      - dionaea_var:/dionaea:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      - "3000:3000"
    networks:
      - honeypot_ingest
      - app_api
      - db_private
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.5"
          pids: 256

  suricata:
    logging: *json-logging
    build:
      context: ./sensors/suricata
    container_name: suricata
    restart: unless-stopped
    init: true
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
      - SETPCAP
      - SETUID
      - SETGID
    environment:
      SURICATA_INTERFACE: ${SURICATA_INTERFACE:-eth0}
    volumes:
      - suricata_logs:/tmp/suricata-logs
    deploy:
      resources:
        limits:
          cpus: "1.0"
          pids: 256

  vector:
    <<: *service-defaults
    logging: *json-logging
    image: timberio/vector:0.40.0-alpine
    container_name: vector
    depends_on:
      cowrie:
        condition: service_started
      ingest-api:
        condition: service_healthy
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var:ro
      - suricata_logs:/tmp/suricata-logs:ro
      - ./vector/cowrie.toml:/etc/vector/cowrie.toml:ro
      - ./vector/suricata.toml:/etc/vector/suricata.toml:ro
      - vector_data:/var/lib/vector
    command: ["--config", "/etc/vector/cowrie.toml", "--config", "/etc/vector/suricata.toml"]
    environment:
      COWRIE_LOG_PATH: /cowrie/cowrie-git/var/log/cowrie/cowrie.json
      SENSOR_ID: ${SENSOR_ID_SSH:-cowrie-ssh-01}
      SURICATA_SENSOR_ID: ${SENSOR_ID_SURICATA:-suricata-01}
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
    networks:
      - honeypot_ingest
    deploy:
      resources:
        limits:
          cpus: "0.5"
          pids: 128

  dionaea:
    <<: *service-defaults
    logging: *json-logging
    image: ghcr.io/telekom-security/dionaea:24.04.1
    container_name: dionaea
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      ingest-api:
        condition: service_healthy
    ports:
      - "21:21"
      - "42:42"
      - "8081:81"
      - "69:69/udp"
      - "135:135"
      - "445:445"
      - "1433:1433"
      - "1723:1723"
      - "1883:1883"
      - "3306:3306"
    volumes:
      - dionaea_var:/opt/dionaea/var/lib/dionaea
      - ./sensors/dionaea/dionaea.cfg:/opt/dionaea/etc/dionaea/dionaea.cfg:ro
      - ./sensors/dionaea/log_json.yaml:/opt/dionaea/etc/dionaea/ihandlers/log_json.yaml:ro
      - ./sensors/dionaea/emu_scripts.yaml:/opt/dionaea/etc/dionaea/ihandlers/emu_scripts.yaml:ro
      - ./sensors/dionaea/services-enabled:/opt/dionaea/etc/dionaea/services-enabled:ro
      - ./sensors/dionaea/util.py:/opt/dionaea/lib/dionaea/python/dionaea/util.py:ro
    networks:
      - edge
      - honeypot_ingest
    deploy:
      resources:
        limits:
          cpus: "1.5"
          pids: 256

  dionaea-shipper:
    <<: *service-defaults
    cap_add:
      - DAC_OVERRIDE
    logging: *json-logging
    image: python:3.12-alpine
    container_name: dionaea-shipper
    depends_on:
      dionaea:
        condition: service_started
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      SENSOR_ID: ${SENSOR_ID_DIONAEA:-dionaea-01}
      SENSOR_NAME: ${SENSOR_NAME_DIONAEA:-Dionaea Multi-Protocol Honeypot}
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_PROTOCOL: dionaea
      SENSOR_VERSION: ${SENSOR_VERSION_DIONAEA:-dionaea}
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_HOST: dionaea
      SENSOR_PORTS: "21 42 135 445 1433 1723 1883 3306 8081"
      SENSOR_PROBE_PORTS: "21 42 135 445 1433 1723 1883 3306 81"
      DIONAEA_LOG_PATH: /opt/dionaea/var/lib/dionaea/dionaea.json
      DIONAEA_OFFSET_FILE: /state/dionaea.offset
      READ_FROM_END: "1"
    volumes:
      - dionaea_var:/opt/dionaea/var/lib/dionaea
      - dionaea_shipper_state:/state
      - ./sensors/dionaea/shipper.py:/shipper.py:ro
    command: ["python3", "/shipper.py"]
    networks:
      - honeypot_ingest
    deploy:
      resources:
        limits:
          cpus: "0.3"
          pids: 64

  port-honeypot:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./sensors/port-honeypot
    container_name: port-honeypot
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORTS: "2375 3389 4444 5900 6379 8888 9090 9200 27017"
      SENSOR_ID: ${SENSOR_ID_PORT:-port-01}
      SENSOR_NAME: Port Honeypot
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
    ports:
      - "2375:2375"
      - "3389:3389"
      - "4444:4444"
      - "5900:5900"
      - "6379:6379"
      - "8888:8888"
      - "9090:9090"
      - "9200:9200"
      - "27017:27017"
    networks:
      - edge
      - honeypot_ingest
    deploy:
      resources:
        limits:
          cpus: "0.5"
          pids: 256

  dashboard:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./apps/dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    container_name: honeypot-dashboard
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      INTERNAL_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      BASE_VMDK_URL: ${BASE_VMDK_URL:-}
      SENSOR_INGEST_URL: ${SENSOR_INGEST_URL:-}
      HONEYPOT_IP: ${HONEYPOT_IP:-}
      HONEYPOT_SSH_PORT: ${HONEYPOT_SSH_PORT:-22}
      HONEYPOT_INGEST_PORT: ${HONEYPOT_INGEST_PORT:-8022}
      DASHBOARD_TIMEZONE: ${DASHBOARD_TIMEZONE:-UTC}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - dashboard_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - app_api
      - db_private
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.0"
          pids: 256

  maintenance:
    <<: *service-defaults
    logging: *json-logging
    image: alpine:3.19
    container_name: honeypot-maintenance
    volumes:
      - dionaea_var:/data/dionaea
      - cowrie_var:/data/cowrie:ro
    command: >
      sh -c "
        while true; do
          echo \"[maintenance] $$(date): cleaning dionaea bistreams > 7d\";
          find /data/dionaea/bistreams -type f -mtime +7 -delete 2>/dev/null || true;
          echo \"[maintenance] $$(date): cleaning dionaea binaries > 30d\";
          find /data/dionaea/binaries -type f -mtime +30 -delete 2>/dev/null || true;
          echo \"[maintenance] $$(date): truncating dionaea.json if > 100MB\";
          [ -f /data/dionaea/dionaea.json ] && [ $$(stat -c%s /data/dionaea/dionaea.json 2>/dev/null || echo 0) -gt 104857600 ] && cp /dev/null /data/dionaea/dionaea.json || true;
          echo \"[maintenance] $$(date): done — sleeping 24h\";
          sleep 86400;
        done
      "
    networks: []
    deploy:
      resources:
        limits:
          cpus: "0.1"
          pids: 32

volumes:
  cowrie_var:
  cowrie_signal:
  dionaea_var:
  dionaea_shipper_state:
  pg_data:
  dashboard_data:
  vector_data:
  suricata_logs:

networks:
  edge:
    driver: bridge
  honeypot_ingest:
    driver: bridge
  app_api:
    driver: bridge
  db_private:
    driver: bridge
  deception_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24
          gateway: 10.0.1.1
