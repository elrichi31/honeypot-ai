x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  cowrie:
    <<: *service-defaults
    build:
      context: ./cowrie
    container_name: cowrie
    ports:
      - "22:2222"
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var
      - ./cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./cowrie/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro
    networks:
      - edge
    pids_limit: 256

  web-honeypot:
    <<: *service-defaults
    build:
      context: ./apps/web-honeypot
    container_name: web-honeypot
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "8080"
    ports:
      - "80:8080"
      - "8443:8080"
    networks:
      - edge
      - honeypot_ingest
    read_only: true
    tmpfs:
      - /tmp
    pids_limit: 256

  postgres:
    image: postgres:16-alpine
    container_name: honeypot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: honeypot_prod
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - db_private

  ingest-api:
    <<: *service-defaults
    build:
      context: ./apps/ingest-api
      dockerfile: Dockerfile.compose
    container_name: ingest-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      PORT: "3000"
      HOST: "0.0.0.0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - honeypot_ingest
      - app_api
      - db_private
    tmpfs:
      - /tmp
    pids_limit: 256

  vector:
    <<: *service-defaults
    image: timberio/vector:0.40.0-alpine
    container_name: vector
    depends_on:
      cowrie:
        condition: service_started
      ingest-api:
        condition: service_healthy
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var:ro
      - ./vector/cowrie.toml:/etc/vector/vector.toml:ro
      - vector_data:/var/lib/vector
    environment:
      COWRIE_LOG_PATH: /cowrie/cowrie-git/var/log/cowrie/cowrie.json
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
    networks:
      - honeypot_ingest
    pids_limit: 128

  ftp-honeypot:
    <<: *service-defaults
    build:
      context: ./apps/ftp-honeypot
    container_name: ftp-honeypot
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "21"
      DST_PORT: "21"
    ports:
      - "21:21"
    networks:
      - edge
      - honeypot_ingest
    pids_limit: 128

  mysql-honeypot:
    <<: *service-defaults
    build:
      context: ./apps/mysql-honeypot
    container_name: mysql-honeypot
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "3306"
      DST_PORT: "3306"
    ports:
      - "3306:3306"
    networks:
      - edge
      - honeypot_ingest
    pids_limit: 128

  port-honeypot:
    <<: *service-defaults
    build:
      context: ./apps/port-honeypot
    container_name: port-honeypot
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORTS: "1433 2375 3389 4444 5900 6379 8888 9090 9200 27017"
    ports:
      - "1433:1433"
      - "2375:2375"
      - "3389:3389"
      - "4444:4444"
      - "5900:5900"
      - "6379:6379"
      - "8888:8888"
      - "9090:9090"
      - "9200:9200"
      - "27017:27017"
    networks:
      - edge
      - honeypot_ingest
    pids_limit: 256

  dashboard:
    <<: *service-defaults
    build:
      context: ./apps/dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    container_name: honeypot-dashboard
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      INTERNAL_API_URL: http://ingest-api:3000
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      HONEYPOT_IP: ${HONEYPOT_IP:-}
      HONEYPOT_SSH_PORT: ${HONEYPOT_SSH_PORT:-22}
      HONEYPOT_INGEST_PORT: ${HONEYPOT_INGEST_PORT:-8022}
      DASHBOARD_TIMEZONE: ${DASHBOARD_TIMEZONE:-UTC}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - dashboard_data:/app/data
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - app_api
      - db_private
    tmpfs:
      - /tmp
    pids_limit: 256

volumes:
  cowrie_var:
  pg_data:
  dashboard_data:
  vector_data:

networks:
  edge:
    driver: bridge
  honeypot_ingest:
    driver: bridge
  app_api:
    driver: bridge
  db_private:
    driver: bridge
