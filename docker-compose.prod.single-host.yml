      EVENT_LOG_PATH: /var/log/port-honeypot/events.json
      SENSOR_CONTROL_SECRET: ${SENSOR_CONTROL_SECRET_PORT:-}
    ports:
      - "2375:2375"
      - "3389:3389"
      - "4444:4444"
      - "5900:5900"
      - "6379:6379"
      - "8888:8888"
      - "9090:9090"
