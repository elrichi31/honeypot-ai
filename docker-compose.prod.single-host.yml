x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  cowrie:
    <<: *service-defaults
    build:
      context: ./cowrie
    container_name: cowrie
    ports:
      - "22:2222"
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var
      - ./cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./cowrie/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro
    networks:
      - edge
    pids_limit: 256

  cowrie-beacon:
    <<: *service-defaults
    image: python:3.12-alpine
    container_name: cowrie-beacon
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      SENSOR_ID: ${SENSOR_ID_SSH:-cowrie-ssh-01}
      SENSOR_IP: ${HONEYPOT_IP:-}
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
    volumes:
      - ./cowrie/heartbeat.py:/heartbeat.py:ro
    command: ["python3", "/heartbeat.py"]
    networks:
      - honeypot_ingest
    pids_limit: 16

  galah:
    <<: *service-defaults
    build:
      context: ./galah
    container_name: galah
    depends_on:
      ingest-api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    environment:
      # LLM_API_KEY is read automatically from the dashboard config file.
      # Override here only if you want to use a different key.
      LLM_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: openai
      LLM_MODEL: ${GALAH_MODEL:-gpt-4o-mini}
      LLM_TEMPERATURE: "0.7"
    command: ["-o", "logs/galah.json", "-c", "config/config.yaml", "-d", "168"]
    ports:
      - "80:8080"
      - "8443:8080"
    volumes:
      - ./galah/config:/galah/config:ro
      - galah_logs:/galah/logs
      - dashboard_data:/dashboard_data:ro
    networks:
      - edge
    pids_limit: 256

  galah-beacon:
    <<: *service-defaults
    image: python:3.12-alpine
    container_name: galah-beacon
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      SENSOR_ID: ${SENSOR_ID_HTTP:-web-01}
      SENSOR_NAME: Web Honeypot (Galah)
      SENSOR_IP: ${HONEYPOT_IP:-}
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
    volumes:
      - ./cowrie/heartbeat.py:/heartbeat.py:ro
    command: ["python3", "/heartbeat.py"]
    networks:
      - honeypot_ingest
    pids_limit: 16

  postgres:
    image: postgres:16-alpine
    container_name: honeypot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: honeypot_prod
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - db_private

  ingest-api:
    <<: *service-defaults
    build:
      context: ./apps/ingest-api
      dockerfile: Dockerfile.compose
    container_name: ingest-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      PORT: "3000"
      HOST: "0.0.0.0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - honeypot_ingest
      - app_api
      - db_private
    tmpfs:
      - /tmp
    pids_limit: 256

  vector:
    <<: *service-defaults
    image: timberio/vector:0.40.0-alpine
    container_name: vector
    depends_on:
      cowrie:
        condition: service_started
      ingest-api:
        condition: service_healthy
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var:ro
      - galah_logs:/galah/logs:ro
      - ./vector:/etc/vector/conf.d:ro
      - vector_data:/var/lib/vector
    command: ["--config-dir", "/etc/vector/conf.d"]
    environment:
      COWRIE_LOG_PATH: /cowrie/cowrie-git/var/log/cowrie/cowrie.json
      GALAH_LOG_PATH: /galah/logs/galah.json
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
    networks:
      - honeypot_ingest
    pids_limit: 128

  ftp-honeypot:
    <<: *service-defaults
    build:
      context: ./apps/ftp-honeypot
    container_name: ftp-honeypot
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "21"
      DST_PORT: "21"
      SENSOR_ID: ${SENSOR_ID_FTP:-ftp-01}
      SENSOR_NAME: FTP Honeypot
      SENSOR_IP: ${HONEYPOT_IP:-}
    ports:
      - "21:21"
    networks:
      - edge
      - honeypot_ingest
    pids_limit: 128

  mysql-honeypot:
    <<: *service-defaults
    build:
      context: ./apps/mysql-honeypot
    container_name: mysql-honeypot
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "3306"
      DST_PORT: "3306"
      SENSOR_ID: ${SENSOR_ID_MYSQL:-mysql-01}
      SENSOR_NAME: MySQL Honeypot
      SENSOR_IP: ${HONEYPOT_IP:-}
    ports:
      - "3306:3306"
    networks:
      - edge
      - honeypot_ingest
    pids_limit: 128

  port-honeypot:
    <<: *service-defaults
    build:
      context: ./apps/port-honeypot
    container_name: port-honeypot
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORTS: "1433 2375 3389 4444 5900 6379 8888 9090 9200 27017"
      SENSOR_ID: ${SENSOR_ID_PORT:-port-01}
      SENSOR_NAME: Port Honeypot
      SENSOR_IP: ${HONEYPOT_IP:-}
    ports:
      - "1433:1433"
      - "2375:2375"
      - "3389:3389"
      - "4444:4444"
      - "5900:5900"
      - "6379:6379"
      - "8888:8888"
      - "9090:9090"
      - "9200:9200"
      - "27017:27017"
    networks:
      - edge
      - honeypot_ingest
    pids_limit: 256

  dashboard:
    <<: *service-defaults
    build:
      context: ./apps/dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    container_name: honeypot-dashboard
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      INTERNAL_API_URL: http://ingest-api:3000
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      HONEYPOT_IP: ${HONEYPOT_IP:-}
      HONEYPOT_SSH_PORT: ${HONEYPOT_SSH_PORT:-22}
      HONEYPOT_INGEST_PORT: ${HONEYPOT_INGEST_PORT:-8022}
      DASHBOARD_TIMEZONE: ${DASHBOARD_TIMEZONE:-UTC}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - dashboard_data:/app/data
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - app_api
      - db_private
    tmpfs:
      - /tmp
    pids_limit: 256

volumes:
  cowrie_var:
  galah_logs:
  pg_data:
  dashboard_data:
  vector_data:

networks:
  edge:
    driver: bridge
  honeypot_ingest:
    driver: bridge
  app_api:
    driver: bridge
  db_private:
    driver: bridge
