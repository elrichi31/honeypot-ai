x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  cowrie:
    <<: *service-defaults
    logging: *json-logging
    cap_add:
      - SETUID
      - SETGID
    build:
      context: ./sensors/cowrie
    container_name: cowrie
    ports:
      - "22:2222"
      - "2222:2222"
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var
      - cowrie_signal:/signal
    networks:
      edge:
      honeypot_ingest:
      deception_net:
        ipv4_address: 10.0.1.100
    deploy:
      resources:
        limits:
          cpus: "0.5"
          pids: 256

  cowrie-beacon:
    <<: *service-defaults
    logging: *json-logging
    image: python:3.12-alpine
    container_name: cowrie-beacon
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      SENSOR_ID: ${SENSOR_ID_SSH:-cowrie-ssh-01}
      SENSOR_NAME: SSH Honeypot (Cowrie)
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_PROTOCOL: ssh
      SENSOR_VERSION: cowrie
      SENSOR_PORTS: "22 2222"
      SENSOR_PROBE_PORTS: "2222 2222"
      SENSOR_HOST: cowrie
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      SENSOR_CONTROL_SECRET: ${SENSOR_CONTROL_SECRET_SSH:-}
      SIGNAL_DIR: /signal
    volumes:
      - ./sensors/cowrie/heartbeat.py:/heartbeat.py:ro
      - ./sensors/_shared/control_agent.py:/control_agent.py:ro
      - cowrie_signal:/signal
    command: ["sh", "-c", "pip install --quiet --no-cache-dir websockets==13.1 && python3 /heartbeat.py"]
    networks:
      - honeypot_ingest
    deploy:
      resources:
        limits:
          cpus: "0.1"
          pids: 16

  web-honeypot:
    <<: *service-defaults
    logging: *json-logging
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    build:
      context: ./sensors/web-honeypot
    container_name: web-honeypot
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "8080"
      SENSOR_ID: ${SENSOR_ID_HTTP:-web-01}
      SENSOR_NAME: Web Honeypot
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_HOST: web-honeypot
      SENSOR_PORTS: "80 8443"
      SENSOR_PROBE_PORTS: "8080 8080"
      EVENT_LOG_PATH: /var/log/web-honeypot/events.json
    ports:
      - "80:8080"
      - "8443:8080"
    networks:
      - edge
      - honeypot_ingest
    volumes:
      - web_events:/var/log/web-honeypot
      - web_signal:/signal:ro
    deploy:
      resources:
        limits:
          cpus: "0.3"
          pids: 128

  web-honeypot-beacon:
    <<: *service-defaults
    logging: *json-logging
    image: python:3.12-alpine
    container_name: web-honeypot-beacon
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      SENSOR_ID: ${SENSOR_ID_HTTP:-web-01}
      SENSOR_PORTS: "80 8443"
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      SENSOR_CONTROL_SECRET: ${SENSOR_CONTROL_SECRET_HTTP:-}
      SIGNAL_DIR: /signal
    volumes:
      - ./sensors/web-honeypot/heartbeat.py:/heartbeat.py:ro
      - ./sensors/_shared/control_agent.py:/control_agent.py:ro
      - web_signal:/signal
    command: ["sh", "-c", "pip install --quiet --no-cache-dir websockets==13.1 && python3 /heartbeat.py"]
    networks:
      - honeypot_ingest
    deploy:
      resources:
        limits:
          cpus: "0.1"
          pids: 16

  postgres:
    logging: *json-logging
    image: postgres:16-alpine
    container_name: honeypot-postgres
    restart: unless-stopped
    # Docker defaults /dev/shm to 64MB; parallel aggregations (the credentials
    # page groups across the credential_attempts view) need shared-memory segments
    # bigger than that and otherwise fail with "could not resize shared memory
    # segment … No space left on device" (SQLSTATE 53100). 256MB is plenty here.
    shm_size: 256mb
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=32MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c max_connections=50
      -c password_encryption=md5
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c wal_keep_size=4096MB
      -c hot_standby=on
      -c max_parallel_workers_per_gather=2
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: honeypot_prod
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
      REPLICATION_SLOT: ${REPLICATION_SLOT:-honeypot_replica_slot}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/postgres/primary-init-replication.sh:/docker-entrypoint-initdb.d/10-replication.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - db_private
    deploy:
      resources:
        limits:
          cpus: "2.0"

  postgres-replica:
    logging: *json-logging
    image: postgres:16-alpine
    container_name: honeypot-postgres-replica
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    user: postgres
    # Dashboard read queries (incl. the heavy credentials aggregations) are routed
    # to this replica, so it needs the same enlarged /dev/shm as the primary to
    # avoid SQLSTATE 53100 on parallel aggregations.
    shm_size: 256mb
    entrypoint: ["sh", "/usr/local/bin/replica-entrypoint.sh"]
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=32MB
      -c effective_cache_size=1GB
      -c random_page_cost=1.1
      -c max_connections=50
      -c hot_standby=on
      -c max_parallel_workers_per_gather=2
    environment:
      PRIMARY_HOST: postgres
      PRIMARY_PORT: "5432"
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
      REPLICATION_SLOT: ${REPLICATION_SLOT:-honeypot_replica_slot}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
      - ./deploy/postgres/replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    healthcheck:
      # On a standby pg_isready succeeds once it accepts read queries.
      test: ["CMD-SHELL", "pg_isready -U honeypot -d honeypot_prod"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - db_private
    deploy:
      resources:
        limits:
          cpus: "1.5"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: honeypot-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 15
      SERVER_RESET_QUERY: ""
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    networks:
      - db_private
    deploy:
      resources:
        limits:
          cpus: "0.2"
          pids: 64

  redis:
    logging: *json-logging
    image: redis:7-alpine
    container_name: honeypot-redis
    restart: unless-stopped
    # noeviction is Redis's default and would reject writes once full; since
    # this is a pure query cache (every value is recomputable via withCache),
    # allkeys-lru lets it evict the least-recently-used entries instead.
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - db_private
    deploy:
      resources:
        limits:
          cpus: "0.5"

  kafka:
    <<: *service-defaults
    logging: *json-logging
    image: apache/kafka:3.8.0
    container_name: honeypot-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "zvlgl0xUR4uoTnaBlAnzEw"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - honeypot_ingest
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          pids: 256

  kafka-init:
    image: apache/kafka:3.8.0
    container_name: honeypot-kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - honeypot_ingest
    command: >
      bash -c "
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic honeypot.cowrie --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic honeypot.suricata --partitions 3 --replication-factor 1 &&
        echo 'Topics created.'
      "

  ingest-api:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./apps/ingest-api
      dockerfile: Dockerfile.compose
    container_name: ingest-api
    depends_on:
      postgres:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@pgbouncer:5432/honeypot_prod?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      # Dashboard read queries are routed here by the read-replicas Prisma extension.
      REPLICA_DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres-replica:5432/honeypot_prod
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      CONTROL_API_SECRET: ${CONTROL_API_SECRET:-}
      SENSOR_CONTROL_CREDENTIAL_PEPPER: ${SENSOR_CONTROL_CREDENTIAL_PEPPER:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      HOST: "0.0.0.0"
      DIONAEA_BINARIES_PATH: /dionaea/binaries
      # Cowrie saves downloaded/uploaded files (named by SHA256) under
      # var/lib/cowrie/downloads inside the cowrie_var volume; expose them so the
      # malware view can list + serve them alongside the Dionaea binaries.
      COWRIE_DOWNLOADS_PATH: /cowrie/lib/cowrie/downloads
      # Our FTP honeypot saves uploads (MD5-named + .meta.json) here; expose them
      # to the malware view alongside Dionaea/Cowrie artifacts.
      FTP_CAPTURES_PATH: /ftp-captures
      SURICATA_OWN_IPS: ${SURICATA_OWN_IPS:-}
      KAFKA_BROKERS: kafka:9092
      # geoip-lite reads its GeoLite2 .dat files from here instead of its
      # bundled (never-updated) node_modules copy. geoip-updater refreshes
      # them weekly in the shared geoip_data volume; geoip-lite's own
      # fsWatcher hot-reloads changed .dat files, so no restart is needed.
      GEODATADIR: /app/geodata
      # credential_attempts is a ~1.6M-row derived view; the scheduler now uses a
      # plain REFRESH (not CONCURRENTLY) to avoid the row-by-row diff that pegged
      # the replica's WAL-replay CPU (2026-07-06 incident). 30min keeps the (now
      # cheaper) refresh infrequent; reads are shielded by withCache.
      MATVIEW_REFRESH_MINUTES: ${MATVIEW_REFRESH_MINUTES:-30}
    group_add:
      - "112"
    volumes:
      - dashboard_data:/app/data
      - dionaea_var:/dionaea:ro
      - cowrie_var:/cowrie:ro
      - ftp_captures:/ftp-captures:ro
      - geoip_data:/app/geodata
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      - "3000:3000"
    networks:
      - honeypot_ingest
      - app_api
      - db_private
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.5"
          pids: 256

  geoip-updater:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./apps/ingest-api
      dockerfile: Dockerfile.compose
    container_name: geoip-updater
    # Reuses the ingest-api image — it already has geoip-lite (and its
    # updatedb.js script) in node_modules, so no separate build is needed.
    entrypoint: ["sh"]
    command:
      - -c
      - >
        while true; do
          echo "[geoip-updater] $$(date): refreshing GeoLite2 databases";
          node node_modules/geoip-lite/scripts/updatedb.js license_key=${MAXMIND_LICENSE_KEY} geodatadir=/app/geodata || echo "[geoip-updater] update failed, will retry next cycle";
          echo "[geoip-updater] $$(date): done — sleeping 7d";
          sleep 604800;
        done
    volumes:
      - geoip_data:/app/geodata
    networks: []
    deploy:
      resources:
        limits:
          cpus: "0.2"
          pids: 32

  suricata:
    logging: *json-logging
    build:
      context: ./sensors/suricata
    container_name: suricata
    restart: unless-stopped
    init: true
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
      - SETPCAP
      - SETUID
      - SETGID
    environment:
      SURICATA_INTERFACE: ${SURICATA_INTERFACE:-eth0}
    volumes:
      - suricata_logs:/tmp/suricata-logs
    deploy:
      resources:
        limits:
          cpus: "1.0"
          pids: 256

  vector:
    <<: *service-defaults
    logging: *json-logging
    image: timberio/vector:0.40.0-alpine
    container_name: vector
    depends_on:
      cowrie:
        condition: service_started
      ingest-api:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var:ro
      - suricata_logs:/tmp/suricata-logs:ro
      - galah_events:/var/log/galah:ro
      - web_events:/var/log/web-honeypot:ro
      - ftp_events:/var/log/ftp-honeypot:ro
      - mysql_events:/var/log/mysql-honeypot:ro
      - port_events:/var/log/port-honeypot:ro
      - smb_events:/var/log/smb-honeypot:ro
      - ./vector/conf.d:/etc/vector/conf.d
      - vector_data:/var/lib/vector
    command: ["--config-dir", "/etc/vector/conf.d/"]
    environment:
      COWRIE_LOG_PATH: /cowrie/cowrie-git/var/log/cowrie/cowrie.json
      SENSOR_ID: ${SENSOR_ID_SSH:-cowrie-ssh-01}
      SURICATA_SENSOR_ID: ${SENSOR_ID_SURICATA:-suricata-01}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      GALAH_LOG_PATH: /var/log/galah/galah.json
      WEB_LOG_PATH: /var/log/web-honeypot/events.json
      FTP_LOG_PATH: /var/log/ftp-honeypot/events.json
      MYSQL_LOG_PATH: /var/log/mysql-honeypot/events.json
      PORT_LOG_PATH: /var/log/port-honeypot/events.json
      SMB_LOG_PATH: /var/log/smb-honeypot/events.json
    networks:
      - honeypot_ingest
    deploy:
      resources:
        limits:
          cpus: "0.5"
          pids: 128

  dionaea:
    <<: *service-defaults
    logging: *json-logging
    image: ghcr.io/telekom-security/dionaea:24.04.1
    container_name: dionaea
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      ingest-api:
        condition: service_healthy
    ports:
      # FTP (21) is served by the dedicated ftp-honeypot, not dionaea.
      - "42:42"
      - "8081:81"
      - "69:69/udp"
      - "135:135"
      - "1433:1433"
      - "1723:1723"
      - "1883:1883"
    volumes:
      - dionaea_var:/opt/dionaea/var/lib/dionaea
      - ./sensors/dionaea/dionaea.cfg:/opt/dionaea/etc/dionaea/dionaea.cfg:ro
      - ./sensors/dionaea/log_json.yaml:/opt/dionaea/etc/dionaea/ihandlers/log_json.yaml:ro
      - ./sensors/dionaea/emu_scripts.yaml:/opt/dionaea/etc/dionaea/ihandlers/emu_scripts.yaml:ro
      - ./sensors/dionaea/services-enabled/epmap.yaml:/opt/dionaea/etc/dionaea/services-enabled/epmap.yaml:ro
      - ./sensors/dionaea/services-enabled/http.yaml:/opt/dionaea/etc/dionaea/services-enabled/http.yaml:ro
      - ./sensors/dionaea/services-enabled/mirror.yaml:/opt/dionaea/etc/dionaea/services-enabled/mirror.yaml:ro
      - ./sensors/dionaea/services-enabled/mqtt.yaml:/opt/dionaea/etc/dionaea/services-enabled/mqtt.yaml:ro
      - ./sensors/dionaea/services-enabled/mssql.yaml:/opt/dionaea/etc/dionaea/services-enabled/mssql.yaml:ro
      - ./sensors/dionaea/services-enabled/pptp.yaml:/opt/dionaea/etc/dionaea/services-enabled/pptp.yaml:ro
      - ./sensors/dionaea/services-enabled/tftp.yaml:/opt/dionaea/etc/dionaea/services-enabled/tftp.yaml:ro
      - ./sensors/dionaea/util.py:/opt/dionaea/lib/dionaea/python/dionaea/util.py:ro
    networks:
      - edge
      - honeypot_ingest
    deploy:
      resources:
        limits:
          cpus: "1.5"
          pids: 256

  dionaea-shipper:
    <<: *service-defaults
    cap_add:
      - DAC_OVERRIDE
    logging: *json-logging
    image: python:3.12-alpine
    container_name: dionaea-shipper
    depends_on:
      dionaea:
        condition: service_started
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      SENSOR_ID: ${SENSOR_ID_DIONAEA:-dionaea-01}
      SENSOR_NAME: ${SENSOR_NAME_DIONAEA:-Dionaea Multi-Protocol Honeypot}
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_PROTOCOL: dionaea
      SENSOR_VERSION: ${SENSOR_VERSION_DIONAEA:-dionaea}
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_HOST: dionaea
      # 3306 -> dedicated mysql-honeypot, 21 -> dedicated ftp-honeypot. Keep both
      # out of dionaea's port list so those fingerprints never re-attach to dionaea.
      SENSOR_PORTS: "42 135 1433 1723 1883 8081"
      SENSOR_PROBE_PORTS: "42 135 1433 1723 1883 81"
      DIONAEA_LOG_PATH: /opt/dionaea/var/lib/dionaea/dionaea.json
      DIONAEA_OFFSET_FILE: /state/dionaea.offset
      READ_FROM_END: "1"
    volumes:
      - dionaea_var:/opt/dionaea/var/lib/dionaea
      - dionaea_shipper_state:/state
      - ./sensors/dionaea/shipper.py:/shipper.py:ro
    command: ["python3", "/shipper.py"]
    networks:
      - honeypot_ingest
    deploy:
      resources:
        limits:
          cpus: "0.3"
          pids: 64

  mysql-honeypot:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./sensors/mysql-honeypot
    container_name: mysql-honeypot
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "3306"
      DST_PORT: "3306"
      SENSOR_ID: ${SENSOR_ID_MYSQL:-mysql-01}
      SENSOR_NAME: ${SENSOR_NAME_MYSQL:-MySQL Honeypot}
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_HOST: mysql-honeypot
      EVENT_LOG_PATH: /var/log/mysql-honeypot/events.json
      SENSOR_CONTROL_SECRET: ${SENSOR_CONTROL_SECRET_MYSQL:-}
    ports:
      - "3306:3306"
    volumes:
      - mysql_events:/var/log/mysql-honeypot
      - ./sensors/_shared/control_agent.py:/app/control_agent.py:ro
      - ./sensors/_shared/persisted_config.py:/app/persisted_config.py:ro
      - mysql_config:/config
    networks:
      - edge
      - honeypot_ingest
    deploy:
      resources:
        limits:
          cpus: "0.3"
          pids: 128

  port-honeypot:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./sensors/port-honeypot
    container_name: port-honeypot
    depends_on:
      ingest-api:
