  dashboard:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./apps/dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    container_name: honeypot-dashboard
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      INTERNAL_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      CONTROL_API_SECRET: ${CONTROL_API_SECRET:-}
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      BASE_VMDK_URL: ${BASE_VMDK_URL:-}
      SENSOR_INGEST_URL: ${SENSOR_INGEST_URL:-}
      HONEYPOT_IP: ${HONEYPOT_IP:-}
      HONEYPOT_SSH_PORT: ${HONEYPOT_SSH_PORT:-22}
      HONEYPOT_INGEST_PORT: ${HONEYPOT_INGEST_PORT:-8022}
      DASHBOARD_TIMEZONE: ${DASHBOARD_TIMEZONE:-UTC}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - dashboard_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - app_api
      - db_private
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.0"
          pids: 256

  maintenance:
    <<: *service-defaults
    logging: *json-logging
    image: alpine:3.19
    container_name: honeypot-maintenance
    volumes:
      - dionaea_var:/data/dionaea
      - cowrie_var:/data/cowrie
      - smb_captures:/data/smb-captures
    command: >
      sh -c "
        while true; do
          echo \"[maintenance] $$(date): cleaning dionaea bistreams > 7d\";
          find /data/dionaea/bistreams -type f -mtime +7 -delete 2>/dev/null || true;
          echo \"[maintenance] $$(date): cleaning dionaea binaries > 30d\";
          find /data/dionaea/binaries -type f -mtime +30 -delete 2>/dev/null || true;
          echo \"[maintenance] $$(date): cleaning cowrie downloads > 30d\";
          find /data/cowrie/lib/cowrie/downloads -type f -mtime +30 -delete 2>/dev/null || true;
          echo \"[maintenance] $$(date): cleaning smb captures > 30d\";
          find /data/smb-captures -type f -mtime +30 -delete 2>/dev/null || true;
          echo \"[maintenance] $$(date): truncating dionaea.json if > 100MB\";
          [ -f /data/dionaea/dionaea.json ] && [ $$(stat -c%s /data/dionaea/dionaea.json 2>/dev/null || echo 0) -gt 104857600 ] && cp /dev/null /data/dionaea/dionaea.json || true;
          echo \"[maintenance] $$(date): done — sleeping 24h\";
          sleep 86400;
        done
      "
    networks: []
    deploy:
      resources:
        limits:
          cpus: "0.1"
          pids: 32

volumes:
  cowrie_var:
  cowrie_signal:
  dionaea_var:
  dionaea_shipper_state:
  pg_data:
  pg_replica_data:
  dashboard_data:
  vector_data:
  suricata_logs:
  kafka_data:
  galah_events:
  web_events:
  web_signal:
  ftp_events:
  mysql_events:
  port_events:
  smb_events:
  smb_share:
  smb_captures:
  ftp_captures:
  geoip_data:
  ftp_config:
  mysql_config:
  port_config:
  smb_config:

networks:
  edge:
    driver: bridge
  honeypot_ingest:
    driver: bridge
  app_api:
    driver: bridge
  db_private:
    driver: bridge
  deception_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24
          gateway: 10.0.1.1
