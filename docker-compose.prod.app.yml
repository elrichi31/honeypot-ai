x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    logging: *json-logging
    image: postgres:16-alpine
    container_name: honeypot-postgres
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=32MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: honeypot_prod
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - db_private

  redis:
    logging: *json-logging
    image: redis:7-alpine
    container_name: honeypot-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - db_private

  ingest-api:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./apps/ingest-api
      dockerfile: Dockerfile.compose
    container_name: ingest-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      BASE_VMDK_URL: ${BASE_VMDK_URL:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      HOST: "0.0.0.0"
      DIONAEA_BINARIES_PATH: /dionaea/binaries
    volumes:
      - dashboard_data:/app/data
      - dionaea_var:/dionaea:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      # Solo expone en la VPN (Tailscale / WireGuard).
      # Cambia 0.0.0.0 por la IP de la interfaz VPN si quieres mayor restriccion,
      # o usa reglas de firewall (ufw/iptables) para bloquear acceso publico a :3000.
      - "3000:3000"
    networks:
      - app_api
      - db_private
    tmpfs:
      - /tmp
    pids_limit: 256

  dashboard:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./apps/dashboard
      args:
        # El navegador llama a ingest-api a traves del proxy Caddy.
        # Usa el mismo dominio del dashboard con el prefijo /api o un subdominio aparte.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.${DASHBOARD_DOMAIN}}
    container_name: honeypot-dashboard
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.${DASHBOARD_DOMAIN}}
      INTERNAL_API_URL: http://ingest-api:3000
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: https://${DASHBOARD_DOMAIN}
      BASE_VMDK_URL: ${BASE_VMDK_URL:-}
      SENSOR_INGEST_URL: ${SENSOR_INGEST_URL:-}
      HONEYPOT_IP: ${HONEYPOT_IP:-}
      HONEYPOT_SSH_PORT: ${HONEYPOT_SSH_PORT:-8022}
      HONEYPOT_INGEST_PORT: ${HONEYPOT_INGEST_PORT:-22}
      DASHBOARD_TIMEZONE: ${DASHBOARD_TIMEZONE:-UTC}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - dashboard_data:/app/data
    # Sin puerto publico — Caddy es el unico punto de entrada al dashboard.
    expose:
      - "4000"
    networks:
      - app_api
      - db_private
      - caddy_net
    tmpfs:
      - /tmp
    pids_limit: 256

  caddy:
    logging: *json-logging
    image: caddy:2-alpine
    container_name: honeypot-caddy
    restart: unless-stopped
    ports:
      - "80:80"    # redireccion HTTP → HTTPS automatica
      - "443:443"  # HTTPS dashboard (y opcionalmente ingest-api en subdominio)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN}
      API_DOMAIN: ${API_DOMAIN:-api.${DASHBOARD_DOMAIN}}
    networks:
      - caddy_net
    cap_add:
      - NET_BIND_SERVICE  # necesario para bind en :80 y :443

volumes:
  pg_data:
  dashboard_data:
  caddy_data:
  caddy_config:
  dionaea_var:
    external: true
    name: honeypot-ai_dionaea_var

networks:
  app_api:
    driver: bridge
  db_private:
    driver: bridge
  caddy_net:
    driver: bridge
