x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  postgres:
    image: postgres:16-alpine
    container_name: honeypot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: honeypot_prod
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - db_private

  ingest-api:
    <<: *service-defaults
    build:
      context: ./apps/ingest-api
    container_name: ingest-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      PORT: "3000"
      # Escucha en todas las interfaces para que el web-honeypot
      # del VPS honeypot pueda llegar por la VPN (100.x.x.x:3000).
      # El firewall del servidor app debe bloquear :3000 desde internet publico.
      HOST: "0.0.0.0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      # Solo expone en la VPN (Tailscale / WireGuard).
      # Cambia 0.0.0.0 por la IP de la interfaz VPN si quieres mayor restriccion,
      # o usa reglas de firewall (ufw/iptables) para bloquear acceso publico a :3000.
      - "3000:3000"
    networks:
      - app_api
      - db_private
    tmpfs:
      - /tmp
    pids_limit: 256

  log-puller:
    <<: *service-defaults
    build:
      context: ./scripts
      dockerfile: Dockerfile.puller
    container_name: log-puller
    depends_on:
      ingest-api:
        condition: service_healthy
    volumes:
      - ./scripts/pull-cowrie-logs.sh:/pull-cowrie-logs.sh:ro
      # Monta la clave SSH del host para acceder al VPS honeypot por VPN.
      # Genera la clave con: ssh-keygen -t ed25519 -f ~/.ssh/honeypot_vps -N ""
      # Luego copia la publica al VPS: ssh-copy-id -p 8022 -i ~/.ssh/honeypot_vps.pub user@<vps-vpn-ip>
      - ${SSH_KEY:-~/.ssh/honeypot_vps}:/root/.ssh/honeypot_vps:ro
    environment:
      API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      DIRECT_FILE: "false"
      VPS_HOST: ${HONEYPOT_VPN_IP}      # IP VPN del VPS honeypot (ej: 100.x.y.z)
      VPS_SSH_PORT: ${HONEYPOT_SSH_PORT:-8022}
      VPS_USER: ${HONEYPOT_SSH_USER:-root}
      SSH_KEY: /root/.ssh/honeypot_vps
      REMOTE_LOG: ${COWRIE_LOG_PATH:-/root/honeypot-ai/cowrie.json}
      POLL_INTERVAL: ${POLL_INTERVAL:-5}
    command: ["bash", "/pull-cowrie-logs.sh"]
    networks:
      - app_api
    read_only: true
    tmpfs:
      - /tmp
      - /root/.ssh
    pids_limit: 64

  dashboard:
    <<: *service-defaults
    build:
      context: ./apps/dashboard
      args:
        # El navegador llama a ingest-api a traves del proxy Caddy.
        # Usa el mismo dominio del dashboard con el prefijo /api o un subdominio aparte.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.${DASHBOARD_DOMAIN}}
    container_name: honeypot-dashboard
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.${DASHBOARD_DOMAIN}}
      INTERNAL_API_URL: http://ingest-api:3000
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: https://${DASHBOARD_DOMAIN}
      HONEYPOT_IP: ${HONEYPOT_IP:-}
      HONEYPOT_SSH_PORT: ${HONEYPOT_SSH_PORT:-8022}
      HONEYPOT_INGEST_PORT: ${HONEYPOT_INGEST_PORT:-22}
      DASHBOARD_TIMEZONE: ${DASHBOARD_TIMEZONE:-UTC}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - dashboard_data:/app/data
    # Sin puerto publico — Caddy es el unico punto de entrada al dashboard.
    expose:
      - "4000"
    networks:
      - app_api
      - db_private
      - caddy_net
    tmpfs:
      - /tmp
    pids_limit: 256

  caddy:
    image: caddy:2-alpine
    container_name: honeypot-caddy
    restart: unless-stopped
    ports:
      - "80:80"    # redireccion HTTP → HTTPS automatica
      - "443:443"  # HTTPS dashboard (y opcionalmente ingest-api en subdominio)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN}
      API_DOMAIN: ${API_DOMAIN:-api.${DASHBOARD_DOMAIN}}
    networks:
      - caddy_net
    cap_add:
      - NET_BIND_SERVICE  # necesario para bind en :80 y :443

volumes:
  pg_data:
  dashboard_data:
  caddy_data:
  caddy_config:

networks:
  app_api:
    driver: bridge
  db_private:
    driver: bridge
  caddy_net:
    driver: bridge
