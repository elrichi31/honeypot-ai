services:
  cowrie:
    build:
      context: ./sensors/cowrie
    container_name: cowrie
    restart: unless-stopped
    ports:
      - "22:2222"
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var
      - ./sensors/cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./sensors/cowrie/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro

  postgres:
    image: postgres:16-alpine
    container_name: honeypot-postgres
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=32MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-honeypot}
      POSTGRES_DB: honeypot_prod
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: honeypot-redis
    restart: unless-stopped
    # noeviction is Redis's default and would reject writes once full; since
    # this is a pure query cache (every value is recomputable via withCache),
    # allkeys-lru lets it evict the least-recently-used entries instead.
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ingest-api:
    build:
      context: ./apps/ingest-api
      dockerfile: Dockerfile.compose
    container_name: ingest-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD:-honeypot}@postgres:5432/honeypot_prod
      DIRECT_DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD:-honeypot}@postgres:5432/honeypot_prod
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      CORS_ALLOWED_ORIGINS: ${BETTER_AUTH_URL:-http://localhost:4000}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      PORT: "3000"
      HOST: "0.0.0.0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      - "3000:3000"

  seed:
    build:
      context: ./apps/ingest-api
      dockerfile: Dockerfile.compose
    container_name: honeypot-seed
    restart: "no"
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD:-honeypot}@postgres:5432/honeypot_prod
    command: ["sh", "-c", "npx prisma db seed"]

  kafka:
    image: apache/kafka:3.8.0
    container_name: honeypot-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # Single-node dev cluster: replication factor must be 1 for internal topics
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "zvlgl0xUR4uoTnaBlAnzEw"
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 60s

  kafka-init:
    image: apache/kafka:3.8.0
    container_name: honeypot-kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic honeypot.cowrie --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic honeypot.suricata --partitions 3 --replication-factor 1 &&
        echo 'Topics created.'
      "

  vector:
    image: timberio/vector:0.40.0-alpine
    container_name: vector
    restart: unless-stopped
    command:
      - "--config-dir"
      - "/etc/vector/conf.d/"
    depends_on:
      - cowrie
      - kafka
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var:ro
      - suricata_logs:/tmp/suricata-logs:ro
      - galah_events:/var/log/galah:ro
      - web_events:/var/log/web-honeypot:ro
      - ftp_events:/var/log/ftp-honeypot:ro
      - mysql_events:/var/log/mysql-honeypot:ro
      - port_events:/var/log/port-honeypot:ro
      - smb_events:/var/log/smb-honeypot:ro
      - ./vector/conf.d:/etc/vector/conf.d
      - vector_data:/var/lib/vector
    environment:
      COWRIE_LOG_PATH: /cowrie/cowrie-git/var/log/cowrie/cowrie.json
      SENSOR_ID: ${SENSOR_ID_SSH:-cowrie-ssh-01}
      SURICATA_SENSOR_ID: ${SENSOR_ID_SURICATA:-suricata-01}
      KAFKA_BROKERS: kafka:9092
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      GALAH_LOG_PATH: /var/log/galah/galah.json
      WEB_LOG_PATH: /var/log/web-honeypot/events.json
      FTP_LOG_PATH: /var/log/ftp-honeypot/events.json
      MYSQL_LOG_PATH: /var/log/mysql-honeypot/events.json
      PORT_LOG_PATH: /var/log/port-honeypot/events.json
      SMB_LOG_PATH: /var/log/smb-honeypot/events.json

  web-honeypot:
    build:
      context: ./sensors/web-honeypot
    container_name: web-honeypot
    restart: unless-stopped
    environment:
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      EVENT_LOG_PATH: /var/log/web-honeypot/events.json
      PORT: "8080"
    volumes:
      - web_events:/var/log/web-honeypot
    ports:
      - "8080:8080"
    depends_on:
      ingest-api:
        condition: service_healthy

  ftp-honeypot:
    build:
      context: ./sensors/ftp-honeypot
    container_name: ftp-honeypot
    restart: unless-stopped
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      EVENT_LOG_PATH: /var/log/ftp-honeypot/events.json
      PORT: "2121"   # dev uses non-privileged port
      DST_PORT: "21"
    volumes:
      - ftp_events:/var/log/ftp-honeypot
    ports:
      - "2121:2121"

  mysql-honeypot:
    build:
      context: ./sensors/mysql-honeypot
    container_name: mysql-honeypot
    restart: unless-stopped
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      EVENT_LOG_PATH: /var/log/mysql-honeypot/events.json
      PORT: "3307"   # dev uses 3307 to avoid conflict with postgres on 3306
      DST_PORT: "3306"
    volumes:
      - mysql_events:/var/log/mysql-honeypot
    ports:
      - "3307:3307"

  port-honeypot:
    build:
      context: ./sensors/port-honeypot
    container_name: port-honeypot
    restart: unless-stopped
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      EVENT_LOG_PATH: /var/log/port-honeypot/events.json
      PORTS: "6379 8888 9090 9200 27017"  # subset for dev
    volumes:
      - port_events:/var/log/port-honeypot
    ports:
      - "6379:6379"
      - "8888:8888"
      - "9090:9090"
      - "9200:9200"
      - "27017:27017"

  smb-honeypot:
    build:
      context: ./sensors/smb-honeypot
    container_name: smb-honeypot
    restart: unless-stopped
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      EVENT_LOG_PATH: /var/log/smb-honeypot/events.json
      PORT: "4445"   # dev uses non-privileged port (445 requires root/cap)
      DST_PORT: "445"
    volumes:
      - smb_events:/var/log/smb-honeypot
    ports:
      - "4445:4445"

  dashboard:
    build:
      context: ./apps/dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    container_name: honeypot-dashboard
    restart: unless-stopped
    depends_on:
      ingest-api:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      INTERNAL_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      HONEYPOT_IP: ${HONEYPOT_IP:-}
      HONEYPOT_SSH_PORT: ${HONEYPOT_SSH_PORT:-22}
      HONEYPOT_INGEST_PORT: ${HONEYPOT_INGEST_PORT:-8022}
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD:-honeypot}@postgres:5432/honeypot_prod
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      DASHBOARD_TIMEZONE: ${DASHBOARD_TIMEZONE:-UTC}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - dashboard_data:/app/data
    ports:
      - "4000:4000"

volumes:
  cowrie_var:
  pg_data:
  dashboard_data:
  vector_data:
  kafka_data:
  suricata_logs:
  galah_events:
  web_events:
  ftp_events:
  mysql_events:
  port_events:
  smb_events:
