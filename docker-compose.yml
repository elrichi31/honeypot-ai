services:
  cowrie:
    build:
      context: ./cowrie
    container_name: cowrie
    restart: unless-stopped
    ports:
      - "2222:2222"
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var
      - ./cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./cowrie/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro

  postgres:
    image: postgres:16-alpine
    container_name: honeypot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-honeypot}
      POSTGRES_DB: honeypot_prod
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot"]
      interval: 3s
      timeout: 3s
      retries: 10

  ingest-api:
    build:
      context: ./apps/ingest-api
      dockerfile: Dockerfile.compose
    container_name: ingest-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD:-honeypot}@postgres:5432/honeypot_prod
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      PORT: "3000"
      HOST: "0.0.0.0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      - "3000:3000"

  seed:
    build:
      context: ./apps/ingest-api
      dockerfile: Dockerfile.compose
    container_name: honeypot-seed
    restart: "no"
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD:-honeypot}@postgres:5432/honeypot_prod
    command: ["sh", "-c", "npx prisma db seed"]

  vector:
    image: timberio/vector:0.40.0-alpine
    container_name: vector
    restart: unless-stopped
    depends_on:
      - cowrie
      - ingest-api
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var:ro
      - ./vector/cowrie.toml:/etc/vector/vector.toml:ro
      - vector_data:/var/lib/vector
    environment:
      COWRIE_LOG_PATH: /cowrie/cowrie-git/var/log/cowrie/cowrie.json
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}

  web-honeypot:
    build:
      context: ./apps/web-honeypot
    container_name: web-honeypot
    restart: unless-stopped
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      ingest-api:
        condition: service_healthy

  ftp-honeypot:
    build:
      context: ./apps/ftp-honeypot
    container_name: ftp-honeypot
    restart: unless-stopped
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      PORT: "2121"   # dev uses non-privileged port
      DST_PORT: "21"
    ports:
      - "2121:2121"

  mysql-honeypot:
    build:
      context: ./apps/mysql-honeypot
    container_name: mysql-honeypot
    restart: unless-stopped
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      PORT: "3307"   # dev uses 3307 to avoid conflict with postgres on 3306
      DST_PORT: "3306"
    ports:
      - "3307:3307"

  port-honeypot:
    build:
      context: ./apps/port-honeypot
    container_name: port-honeypot
    restart: unless-stopped
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      INGEST_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      PORTS: "6379 8888 9090 9200 27017"  # subset for dev
    ports:
      - "6379:6379"
      - "8888:8888"
      - "9090:9090"
      - "9200:9200"
      - "27017:27017"

  dashboard:
    build:
      context: ./apps/dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    container_name: honeypot-dashboard
    restart: unless-stopped
    depends_on:
      ingest-api:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      INTERNAL_API_URL: http://ingest-api:3000
      HONEYPOT_IP: ${HONEYPOT_IP:-}
      HONEYPOT_SSH_PORT: ${HONEYPOT_SSH_PORT:-22}
      HONEYPOT_INGEST_PORT: ${HONEYPOT_INGEST_PORT:-8022}
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD:-honeypot}@postgres:5432/honeypot_prod
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      DASHBOARD_TIMEZONE: ${DASHBOARD_TIMEZONE:-UTC}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - dashboard_data:/app/data
    ports:
      - "4000:4000"

volumes:
  cowrie_var:
  pg_data:
  dashboard_data:
  vector_data:
