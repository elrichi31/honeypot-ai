services:
  cowrie:
    image: cowrie/cowrie:latest
    container_name: cowrie
    restart: unless-stopped
    ports:
      - "2222:2222"
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var

  postgres:
    image: postgres:16-alpine
    container_name: honeypot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: honeypot
      POSTGRES_DB: honeypot
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot"]
      interval: 3s
      timeout: 3s
      retries: 10

  log-puller:
    build:
      context: ./scripts
      dockerfile: Dockerfile.puller
    container_name: log-puller
    restart: unless-stopped
    depends_on:
      - cowrie
      - ingest-api
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var:ro
      - ./scripts/pull-cowrie-logs.sh:/pull-cowrie-logs.sh:ro
    environment:
      API_URL: http://ingest-api:3000
      DIRECT_FILE: "true"
    command: ["bash", "/pull-cowrie-logs.sh"]

  ingest-api:
    build:
      context: ./apps/ingest-api
    container_name: ingest-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://honeypot:honeypot@postgres:5432/honeypot
      PORT: "3000"
      HOST: "0.0.0.0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      - "3000:3000"

  dashboard:
    build:
      context: ./apps/dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    container_name: honeypot-dashboard
    restart: unless-stopped
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      INTERNAL_API_URL: http://ingest-api:3000
      # Honeypot infrastructure — pre-fills Settings page
      HONEYPOT_IP: ${HONEYPOT_IP:-}
      HONEYPOT_SSH_PORT: ${HONEYPOT_SSH_PORT:-22}
      HONEYPOT_INGEST_PORT: ${HONEYPOT_INGEST_PORT:-8022}
    volumes:
      - dashboard_data:/app/data
    ports:
      - "4000:4000"

volumes:
  cowrie_var:
  pg_data:
  dashboard_data:
