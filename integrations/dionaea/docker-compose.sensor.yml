x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true

services:
  dionaea:
    <<: *service-defaults
    image: ghcr.io/telekom-security/dionaea:24.04.1
    container_name: dionaea
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "21:21"
      - "42:42"
      - "135:135"
      - "445:445"
      - "1433:1433"
      - "1723:1723"
      - "1883:1883"
      - "3306:3306"
      - "8081:8081"
      - "69:69/udp"
    volumes:
      - dionaea_var:/opt/dionaea/var/lib/dionaea
      - ./log_json.yaml:/opt/dionaea/etc/dionaea/ihandlers-enabled/log_json.yaml:ro
    pids_limit: 256

  dionaea-shipper:
    <<: *service-defaults
    image: python:3.12-alpine
    container_name: dionaea-shipper
    depends_on:
      - dionaea
    environment:
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      SENSOR_ID: ${SENSOR_ID_DIONAEA:-dionaea-01}
      SENSOR_NAME: ${SENSOR_NAME_DIONAEA:-Dionaea Multi-Protocol Honeypot}
      SENSOR_PROTOCOL: dionaea
      SENSOR_VERSION: ${SENSOR_VERSION_DIONAEA:-dionaea}
      SENSOR_IP: ${SENSOR_IP_DIONAEA:-}
      SENSOR_HOST: dionaea
      SENSOR_PORTS: "21 42 69 135 445 1433 1723 1883 3306 8081"
      SENSOR_PROBE_PORTS: "21 42 69 135 445 1433 1723 1883 3306 8081"
      DIONAEA_LOG_PATH: /opt/dionaea/var/lib/dionaea/dionaea.json
      DIONAEA_OFFSET_FILE: /state/dionaea.offset
      READ_FROM_END: "1"
    volumes:
      - dionaea_var:/opt/dionaea/var/lib/dionaea:ro
      - dionaea_shipper_state:/state
      - ./shipper.py:/shipper.py:ro
    command: ["python3", "/shipper.py"]
    pids_limit: 64

volumes:
  dionaea_var:
  dionaea_shipper_state:
