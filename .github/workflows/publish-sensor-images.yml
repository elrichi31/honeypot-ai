name: Publish Sensor Images

on:
  push:
    branches: [master]
    paths:
      - "sensors/cowrie/**"
      - "sensors/web-honeypot/**"
      - "sensors/ftp-honeypot/**"
      - "sensors/mysql-honeypot/**"
      - "sensors/port-honeypot/**"
      - "sensors/suricata/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/honeypot-ai

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: cowrie
            context: sensors/cowrie
          - service: web-honeypot
            context: sensors/web-honeypot
          - service: ftp-honeypot
            context: sensors/ftp-honeypot
          - service: mysql-honeypot
            context: sensors/mysql-honeypot
          - service: port-honeypot
            context: sensors/port-honeypot
          - service: suricata
            context: sensors/suricata

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-to: type=inline
