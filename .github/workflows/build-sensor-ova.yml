name: Build Sensor OVA

on:
  workflow_dispatch:
    inputs:
      version:
        description: "OVA version tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libguestfs-tools qemu-utils linux-image-generic passt

      - name: Download Ubuntu 24.04 cloud image
        run: |
          wget -q https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img \
            -O /tmp/ubuntu-base.img
          qemu-img resize /tmp/ubuntu-base.img 20G

      - name: Customize image
        run: |
          # Password hash for "honeypot" — generated with: openssl passwd -6 'honeypot'
          PASS_HASH='$6$rounds=656000$NaCl$F3yXIYO0qFQjSmGO1X.WnC0GmP7uW.xTNVoAe/o1pkbivTZRHBenT3oqH/WpBbMYE7gWO0WtCEv0IJzXdqpZ11'

          sudo virt-customize -a /tmp/ubuntu-base.img \
            --hostname honeypot-sensor \
            --root-password "password:honeypot" \
            --run-command "useradd -m -s /bin/bash -G sudo admin || true" \
            --password "admin:password:honeypot" \
            --run-command "echo 'admin ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/admin && chmod 440 /etc/sudoers.d/admin" \
            --run-command "apt-get update -qq && apt-get install -y -qq ca-certificates curl gnupg" \
            --run-command "install -m 0755 -d /etc/apt/keyrings" \
            --run-command "curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg" \
            --run-command "echo 'deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu noble stable' > /etc/apt/sources.list.d/docker.list" \
            --run-command "apt-get update -qq && apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-compose-plugin open-vm-tools" \
            --run-command "systemctl enable docker" \
            --run-command "usermod -aG docker admin" \
            --mkdir /opt/sensor \
            --copy-in ${{ github.workspace }}/sensors:/opt/sensor/ \
            --copy-in ${{ github.workspace }}/vector:/opt/sensor/ \
            --copy-in ${{ github.workspace }}/docker-compose.prod.honeypot.yml:/opt/sensor/ \
            --run-command "mv /opt/sensor/docker-compose.prod.honeypot.yml /opt/sensor/docker-compose.yml" \
            --copy-in ${{ github.workspace }}/packer/first-run/sensor-provision.sh:/opt/sensor/ \
            --run-command "chmod +x /opt/sensor/sensor-provision.sh" \
            --copy-in ${{ github.workspace }}/packer/first-run/sensor-provision.service:/etc/systemd/system/ \
            --copy-in ${{ github.workspace }}/packer/first-run/sensor.service:/etc/systemd/system/ \
            --run-command "systemctl enable sensor-provision.service" \
            --run-command "chown -R root:root /opt/sensor && chmod -R 750 /opt/sensor" \
            --selinux-relabel

      - name: Convert to OVA
        run: |
          VM_NAME="honeypot-sensor"
          VMDK="/tmp/${VM_NAME}.vmdk"
          OVF="/tmp/${VM_NAME}.ovf"
          OVA="/tmp/${VM_NAME}.ova"

          echo "Converting QCOW2 → VMDK..."
          qemu-img convert -f qcow2 -O vmdk -o subformat=streamOptimized /tmp/ubuntu-base.img "$VMDK"

          DISK_SIZE_GB=$(qemu-img info --output=json "$VMDK" | python3 -c "import sys,json; print((json.load(sys.stdin)['virtual-size'] + 2**30 - 1) // 2**30)")

          echo "Writing OVF..."
          cat > "$OVF" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <Envelope xmlns="http://schemas.dmtf.org/ovf/envelope/1"
                    xmlns:cim="http://schemas.dmtf.org/wbem/wscim/1/common"
                    xmlns:ovf="http://schemas.dmtf.org/ovf/envelope/1"
                    xmlns:vmw="http://www.vmware.com/schema/ovf"
                    xmlns:vssd="http://schemas.dmtf.org/wbem/wscim/1/cim-schema/2/CIM_VirtualSystemSettingData"
                    xmlns:rasd="http://schemas.dmtf.org/wbem/wscim/1/cim-schema/2/CIM_ResourceAllocationSettingData">
            <References>
              <File ovf:id="disk1" ovf:href="${VM_NAME}.vmdk"/>
            </References>
            <DiskSection>
              <Info>Virtual disk information</Info>
              <Disk ovf:diskId="disk1" ovf:fileRef="disk1"
                    ovf:capacity="${DISK_SIZE_GB}" ovf:capacityAllocationUnits="byte * 2^30"
                    ovf:format="http://www.vmware.com/interfaces/specifications/vmdk.html#streamOptimized"/>
            </DiskSection>
            <NetworkSection>
              <Info>Network</Info>
              <Network ovf:name="VM Network"><Description>VM Network</Description></Network>
            </NetworkSection>
            <VirtualSystem ovf:id="${VM_NAME}">
              <Info>Honeypot Sensor VM — Ubuntu 24.04 LTS</Info>
              <Name>${VM_NAME}</Name>
              <OperatingSystemSection ovf:id="94" vmw:osType="ubuntu64Guest">
                <Info>Ubuntu 24.04 LTS (64-bit)</Info>
              </OperatingSystemSection>
              <VirtualHardwareSection>
                <Info>Virtual hardware</Info>
                <System>
                  <vssd:ElementName>Virtual Hardware Family</vssd:ElementName>
                  <vssd:InstanceID>0</vssd:InstanceID>
                  <vssd:VirtualSystemType>vmx-19</vssd:VirtualSystemType>
                </System>
                <Item>
                  <rasd:Description>Number of Virtual CPUs</rasd:Description>
                  <rasd:ElementName>2 virtual CPU(s)</rasd:ElementName>
                  <rasd:InstanceID>1</rasd:InstanceID>
                  <rasd:ResourceType>3</rasd:ResourceType>
                  <rasd:VirtualQuantity>2</rasd:VirtualQuantity>
                </Item>
                <Item>
                  <rasd:AllocationUnits>byte * 2^20</rasd:AllocationUnits>
                  <rasd:Description>Memory Size</rasd:Description>
                  <rasd:ElementName>2048 MB of memory</rasd:ElementName>
                  <rasd:InstanceID>2</rasd:InstanceID>
                  <rasd:ResourceType>4</rasd:ResourceType>
                  <rasd:VirtualQuantity>2048</rasd:VirtualQuantity>
                </Item>
                <Item>
                  <rasd:AutomaticAllocation>true</rasd:AutomaticAllocation>
                  <rasd:Connection>VM Network</rasd:Connection>
                  <rasd:ElementName>Network adapter 1</rasd:ElementName>
                  <rasd:InstanceID>3</rasd:InstanceID>
                  <rasd:ResourceSubType>VmxNet3</rasd:ResourceSubType>
                  <rasd:ResourceType>10</rasd:ResourceType>
                </Item>
                <Item>
                  <rasd:Address>0</rasd:Address>
                  <rasd:Description>SCSI Controller</rasd:Description>
                  <rasd:ElementName>SCSI controller 0</rasd:ElementName>
                  <rasd:InstanceID>4</rasd:InstanceID>
                  <rasd:ResourceSubType>VirtualSCSI</rasd:ResourceSubType>
                  <rasd:ResourceType>6</rasd:ResourceType>
                </Item>
                <Item>
                  <rasd:AddressOnParent>0</rasd:AddressOnParent>
                  <rasd:ElementName>Hard disk 1</rasd:ElementName>
                  <rasd:HostResource>ovf:/disk/disk1</rasd:HostResource>
                  <rasd:InstanceID>5</rasd:InstanceID>
                  <rasd:Parent>4</rasd:Parent>
                  <rasd:ResourceType>17</rasd:ResourceType>
                </Item>
              </VirtualHardwareSection>
            </VirtualSystem>
          </Envelope>
          EOF

          echo "Packaging OVA..."
          tar -C /tmp -cvf "$OVA" "${VM_NAME}.ovf" "${VM_NAME}.vmdk"
          echo "Done: $(du -sh $OVA)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sensor-ova-${{ github.event.inputs.version }}
          name: "Sensor OVA ${{ github.event.inputs.version }}"
          body: |
            ## Honeypot Sensor OVA ${{ github.event.inputs.version }}

            Ubuntu 24.04 LTS · Docker pre-installed · auto-provisiona en el primer boot.

            ### Deploy
            1. Descarga `honeypot-sensor.ova` e importa en VMware
            2. En el dashboard: página del cliente → **Download OVA Package** → selecciona servicios → genera token
            3. `scp sensor-provision.env admin@<vm-ip>:/opt/sensor/`
            4. `ssh admin@<vm-ip> "sudo reboot"`

            SSH default: `admin` / `honeypot` — cambia después de provisionar.
          files: /tmp/honeypot-sensor.ova
