name: Build Sensor OVA

on:
  workflow_dispatch:
    inputs:
      version:
        description: "OVA version tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to create GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils ovmf

      - name: Install Packer
        run: |
          PACKER_VERSION="1.11.2"
          wget -q "https://releases.hashicorp.com/packer/${PACKER_VERSION}/packer_${PACKER_VERSION}_linux_amd64.zip" -O /tmp/packer.zip
          sudo unzip -o /tmp/packer.zip -d /usr/local/bin/
          packer --version

      - name: Packer init
        working-directory: packer
        run: packer init sensor.pkr.hcl

      - name: Build OVA
        working-directory: packer
        run: packer build sensor.pkr.hcl
        timeout-minutes: 60

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sensor-ova-${{ github.event.inputs.version }}
          name: "Sensor OVA ${{ github.event.inputs.version }}"
          body: |
            ## Honeypot Sensor OVA ${{ github.event.inputs.version }}

            Ubuntu 24.04 LTS — Docker pre-installed — auto-provisions on first boot.

            ### Deploy instructions
            1. Download `honeypot-sensor.ova`
            2. Import in VMware Workstation / ESXi
            3. In the dashboard: client page → **Download OVA Package** → generate token
            4. `scp sensor-provision.env admin@<vm-ip>:/opt/sensor/`
            5. `ssh admin@<vm-ip> "sudo reboot"`

            Default SSH: `admin` / `honeypot` — change after provisioning.
          files: packer/output/honeypot-sensor.ova
