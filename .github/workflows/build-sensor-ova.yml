name: Build Sensor OVA

on:
  workflow_dispatch:
    inputs:
      version:
        description: "OVA version tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libguestfs-tools qemu-utils linux-image-generic gettext-base

      - name: Download Ubuntu 24.04 cloud image
        run: |
          wget -q https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img \
            -O /tmp/ubuntu-base.img
          qemu-img resize /tmp/ubuntu-base.img 20G

      - name: Inject files into image (no network required)
        run: |
          sudo virt-customize -a /tmp/ubuntu-base.img --no-network \
            --run-command "echo '[Match]\nName=en*\n\n[Network]\nDHCP=yes' > /etc/systemd/network/10-dhcp.network" \
            --run-command "systemctl enable systemd-networkd systemd-resolved" \
            --run-command "useradd -m -s /bin/bash -G sudo sensor" \
            --password "sensor:password:honeypot" \
            --run-command "echo 'sensor ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/sensor && chmod 440 /etc/sudoers.d/sensor" \
            --run-command "sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config" \
            --mkdir /opt/sensor \
            --copy-in ${{ github.workspace }}/sensors:/opt/sensor/ \
            --copy-in ${{ github.workspace }}/vector:/opt/sensor/ \
            --copy-in ${{ github.workspace }}/docker-compose.prod.honeypot.yml:/opt/sensor/ \
            --run-command "mv /opt/sensor/docker-compose.prod.honeypot.yml /opt/sensor/docker-compose.yml" \
            --copy-in ${{ github.workspace }}/packer/first-run/sensor-provision.sh:/opt/sensor/ \
            --copy-in ${{ github.workspace }}/packer/first-run/sensor-provision.service:/etc/systemd/system/ \
            --copy-in ${{ github.workspace }}/packer/first-run/sensor.service:/etc/systemd/system/ \
            --firstboot ${{ github.workspace }}/packer/scripts/firstboot-docker.sh

      - name: Convert to OVA
        env:
          OVA_VERSION: ${{ github.event.inputs.version }}
        run: |
          VM_NAME="honeypot-sensor"
          VMDK="/tmp/${VM_NAME}.vmdk"
          OVF="/tmp/${VM_NAME}.ovf"
          OVA="/tmp/${VM_NAME}.ova"

          echo "Converting QCOW2 → VMDK..."
          qemu-img convert -f qcow2 -O vmdk -o subformat=streamOptimized /tmp/ubuntu-base.img "$VMDK"

          DISK_SIZE_GB=$(qemu-img info --output=json "$VMDK" | \
            python3 -c "import sys,json; print((json.load(sys.stdin)['virtual-size'] + 2**30 - 1) // 2**30)")

          echo "Writing OVF descriptor..."
          export VM_NAME DISK_SIZE_GB OVA_VERSION
          envsubst < packer/ovf-template.xml > "$OVF"
          echo "OVF written ($(wc -l < $OVF) lines)"

          echo "Packaging OVA..."
          tar -C /tmp -cvf "$OVA" "${VM_NAME}.ovf" "${VM_NAME}.vmdk"
          echo "Done: $(du -sh $OVA)"

          # Separate VMDK asset for dashboard per-client OVA generation
          cp "$VMDK" "/tmp/${VM_NAME}-disk.vmdk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sensor-ova-${{ github.event.inputs.version }}
          name: "Sensor OVA ${{ github.event.inputs.version }}"
          body: |
            ## Honeypot Sensor OVA ${{ github.event.inputs.version }}

            Ubuntu 24.04 LTS · zero-touch provisioning via OVF Properties.

            **Deploy (zero-touch):**
            1. En el dashboard: cliente → **Download OVA Package** → selecciona servicios → descarga OVA personalizado
            2. Importa `honeypot-sensor-<client>.ova` en VMware — el token ya viene embebido
            3. La VM se auto-configura en el primer boot (~3 min, necesita internet)

            **Deploy manual (fallback):**
            1. Descarga `honeypot-sensor.ova` e importa en VMware
            2. Copia `sensor-provision.env` al servidor y reinicia

            SSH: `sensor` / `honeypot`

            > `honeypot-sensor-disk.vmdk` — disco base para generación de OVAs por el dashboard.
          files: |
            /tmp/honeypot-sensor.ova
            /tmp/honeypot-sensor-disk.vmdk
