<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{% endblock %}</title>
<style>
html{background:#f0f0f1}
*{box-sizing:border-box}
body{background:#f0f0f1;color:#3c434a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen-Sans,Ubuntu,Cantarell,"Helvetica Neue",sans-serif;font-size:14px;line-height:1.5;margin:0;padding:0}
a{color:#2271b1;text-decoration:none}
a:hover{color:#135e96;text-decoration:underline}
#login{margin:0 auto;padding:7% 0 0;width:352px}
#login h1{text-align:center;margin-bottom:18px}
#login h1 a{display:inline-flex;align-items:center;justify-content:center;height:84px;width:84px;text-decoration:none}
#login h1 .login-mark{align-items:center;background:#1d2327;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);color:#fff;display:inline-flex;font-family:Georgia,"Times New Roman",serif;font-size:52px;font-weight:700;height:84px;justify-content:center;line-height:1;width:84px}
.screen-reader-text{position:absolute;clip:rect(1px,1px,1px,1px);clip-path:inset(50%);height:1px;width:1px;margin:-1px;overflow:hidden;padding:0;border:0}
.login form{background:#fff;border:1px solid #c3c4c7;border-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:26px 24px 22px;margin-top:0}
.login label{display:block;font-size:14px;font-weight:600;margin-bottom:8px;color:#3c434a}
.login input[type=text],.login input[type=password]{background:#fff;border:1px solid #8c8f94;border-radius:4px;color:#2c3338;display:block;font-size:24px;height:44px;padding:3px 10px;width:100%;margin:0 0 16px}
.login input[type=text]:focus,.login input[type=password]:focus{border-color:#2271b1;box-shadow:0 0 0 1px #2271b1;outline:2px solid transparent}
.login .button-primary,.button{background:#2271b1;border:1px solid #2271b1;border-radius:3px;color:#fff;cursor:pointer;display:inline-block;font-size:13px;font-weight:500;line-height:2.15384615;min-height:32px;padding:0 12px;text-decoration:none;white-space:nowrap}
.login .button-primary{width:100%}
.login .button-primary:hover,.button:hover{background:#135e96;border-color:#135e96}
.forgetmenot{float:left;margin:.5em 0 1em}
.forgetmenot label{color:#50575e;font-size:13px;font-weight:400}
.submit{clear:both;margin:.5em 0 0;padding:0;text-align:right}
#nav{font-size:13px;margin:24px 0 0;text-align:center}
#nav a{color:#50575e}
#nav a:hover{color:#135e96}
#backtoblog{font-size:13px;margin:16px 0 0;text-align:center}
#backtoblog a{color:#50575e}
.message{border-left:4px solid #72aee6;background:#f0f6fc;color:#2c3338;margin:0 0 16px;padding:10px 12px;font-size:13px}
#login_error{border-left:4px solid #d63638;background:#fcf0f1;color:#2c3338;margin:0 0 16px;padding:10px 12px;font-size:13px}
</style>
</head>
<body class="login wp-core-ui">
<div id="login">
  <h1>
    <a href="https://wordpress.org/" tabindex="-1">
      <span class="login-mark" aria-hidden="true">W</span>
      <span class="screen-reader-text">TechCorp Solutions</span>
    </a>
  </h1>
  {{ notice_html }}
  {% block content %}{% endblock %}
  {% block footer %}{% endblock %}
</div>
</body>
</html>
