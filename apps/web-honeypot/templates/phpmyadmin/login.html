<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>phpMyAdmin</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:0;background:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;color:#333}
.loginbox{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border:1px solid #dee0e3;border-radius:6px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:32px 36px;width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:24px}
.logo-text{font-size:22px;font-weight:700;color:#e77f00;letter-spacing:-.5px}
.logo-text span{color:#333}
h1{font-size:17px;font-weight:600;margin:0 0 20px;color:#333;text-align:center}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#6b7385;margin-bottom:6px}
input[type=text],input[type=password],select{width:100%;padding:9px 12px;border:1px solid #c9ccd4;border-radius:4px;font-size:14px;color:#333;background:#fff;transition:border-color .15s}
input[type=text]:focus,input[type=password]:focus,select:focus{outline:none;border-color:#4d90fe;box-shadow:0 0 0 3px rgba(77,144,254,.15)}
.btn{width:100%;padding:10px;background:#4d90fe;color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .15s}
.btn:hover{background:#357ae8}
.footer{text-align:center;margin-top:20px;font-size:12px;color:#9aa0b0}
.server-info{background:#f8f9fb;border:1px solid #e6e8ed;border-radius:4px;padding:10px 14px;margin-bottom:20px;font-size:12px;color:#555}
.server-info strong{color:#333}
.alert{background:#fff8e5;border:1px solid #eed58e;border-left:4px solid #e0a800;border-radius:4px;color:#5f4b00;padding:10px 12px;font-size:13px;margin-bottom:18px}
</style>
</head>
<body>
<div class="loginbox">
  <div class="card">
    <div class="logo">
      <div class="logo-text">php<span>MyAdmin</span></div>
    </div>
    <div class="server-info">
      <strong>Server:</strong> {{ server_name }} &nbsp;|&nbsp; <strong>Type:</strong> MySQL 8.0.35
    </div>
    {{ notice_html }}
    <form method="post" action="" name="login_form" id="login_form">
      <div class="form-group">
        <label for="input_username">Username</label>
        <input type="text" name="pma_username" id="input_username" class="textfield" tabindex="1" autocomplete="username" value="{{ submitted_user }}">
      </div>
      <div class="form-group">
        <label for="input_password">Password</label>
        <input type="password" name="pma_password" id="input_password" class="textfield" tabindex="2" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label for="select_server">Server Choice</label>
        <select name="server" id="select_server" tabindex="3">
          <option value="1" {% if selected_server != "2" %}selected{% endif %}>db-primary.internal</option>
          <option value="2" {% if selected_server == "2" %}selected{% endif %}>db-replica.internal</option>
        </select>
      </div>
      <input type="hidden" name="set_session" value="">
      <input type="hidden" name="token" value="9f3a2e1b8c7d4f6a0e5b2c9d8a1f4e7b">
      <button type="submit" name="Login" value="1" id="input_go" class="btn" tabindex="4">Log in</button>
    </form>
    <div class="footer">phpMyAdmin 5.2.1 &bull; <a href="https://www.phpmyadmin.net/" target="_blank" rel="noopener">phpmyadmin.net</a></div>
  </div>
</div>
</body>
</html>
