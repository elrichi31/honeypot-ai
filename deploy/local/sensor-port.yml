services:
  port-honeypot:
    build:
      context: ../../sensors/port-honeypot
    container_name: port-honeypot
    restart: unless-stopped
    environment:
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORTS: ${PORTS:-6379 8888 9090 9200 27017}
      SENSOR_ID: ${SENSOR_ID_PORT:-port-local-01}
      SENSOR_NAME: ${SENSOR_NAME_PORT:-Port Honeypot - Local VM}
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_CONTROL_SECRET: ${SENSOR_CONTROL_SECRET_PORT:-}
    ports:
      - "6379:6379"
      - "8888:8888"
      - "9090:9090"
      - "9200:9200"
      - "27017:27017"
    volumes:
      - ../../sensors/_shared/control_agent.py:/app/control_agent.py:ro
