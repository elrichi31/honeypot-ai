services:
  cowrie:
    build:
      context: ../../sensors/cowrie
    container_name: cowrie
    restart: unless-stopped
    ports:
      - "2222:2222"
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var
      - ../../sensors/cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ../../sensors/cowrie/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro

  cowrie-beacon:
    image: python:3.12-alpine
    container_name: cowrie-beacon
    restart: unless-stopped
    depends_on:
      - cowrie
    environment:
      SENSOR_ID: ${SENSOR_ID_SSH:-cowrie-ssh-local-01}
      SENSOR_NAME: ${SENSOR_NAME_SSH:-SSH Honeypot (Cowrie) - Local VM}
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_PROTOCOL: ssh
      SENSOR_VERSION: cowrie
      SENSOR_PORTS: "2222"
      SENSOR_PROBE_PORTS: "2222"
      SENSOR_HOST: cowrie
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      SENSOR_CONTROL_SECRET: ${SENSOR_CONTROL_SECRET_SSH:-}
    volumes:
      - ../../sensors/cowrie/heartbeat.py:/heartbeat.py:ro
      - ../../sensors/_shared/control_agent.py:/control_agent.py:ro
    command: ["sh", "-c", "pip install --quiet --no-cache-dir websockets==13.1 && python3 /heartbeat.py"]

  vector:
    image: timberio/vector:0.40.0-alpine
    container_name: vector
    restart: unless-stopped
    depends_on:
      - cowrie
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var:ro
      - ../../vector/cowrie.toml:/etc/vector/vector.toml:ro
      - vector_data:/var/lib/vector
    command: ["--config", "/etc/vector/vector.toml"]
    environment:
      COWRIE_LOG_PATH: /cowrie/cowrie-git/var/log/cowrie/cowrie.json
      SENSOR_ID: ${SENSOR_ID_SSH:-cowrie-ssh-local-01}
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}

  web-honeypot:
    build:
      context: ../../sensors/web-honeypot
    container_name: web-honeypot
    restart: unless-stopped
    environment:
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "8080"
      SENSOR_ID: ${SENSOR_ID_HTTP:-web-local-01}
      SENSOR_NAME: ${SENSOR_NAME_HTTP:-Web Honeypot - Local VM}
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_HOST: web-honeypot
      SENSOR_PORTS: "8080 8443"
      SENSOR_PROBE_PORTS: "8080 8080"
    ports:
      - "8080:8080"
      - "8443:8080"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - web_signal:/signal:ro

  web-honeypot-beacon:
    image: python:3.12-alpine
    container_name: web-honeypot-beacon
    restart: unless-stopped
    depends_on:
      - web-honeypot
    environment:
      SENSOR_ID: ${SENSOR_ID_HTTP:-web-local-01}
      SENSOR_PORTS: "8080 8443"
      INGEST_API_URL: ${INGEST_API_URL}
      SENSOR_CONTROL_SECRET: ${SENSOR_CONTROL_SECRET_HTTP:-}
      SIGNAL_DIR: /signal
    volumes:
      - ../../sensors/web-honeypot/heartbeat.py:/heartbeat.py:ro
      - ../../sensors/_shared/control_agent.py:/control_agent.py:ro
      - web_signal:/signal
    command: ["sh", "-c", "pip install --quiet --no-cache-dir websockets==13.1 && python3 /heartbeat.py"]

volumes:
  cowrie_var:
  vector_data:
  web_signal:
