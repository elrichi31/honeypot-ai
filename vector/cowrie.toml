# vector/cowrie.toml — Cowrie log shipper
#
# Tails cowrie.json, parses each JSON line, and publishes each event to Kafka.
# Persists read offset to disk → survives container restarts without losing events.
# Buffers to disk when the broker is unreachable → no events dropped on downtime.
#
# Environment variables (required):
#   COWRIE_LOG_PATH — path to cowrie.json inside the container
#   KAFKA_BROKERS   — Kafka bootstrap servers (e.g. kafka:9092)
#
# ROLLBACK: to revert to HTTP ingestion, comment out [sinks.kafka] and its
# sub-tables, then uncomment [sinks.ingest_api] and all its sub-tables below.

data_dir = "/var/lib/vector"

# ── Source: tail cowrie.json ────────────────────────────────────────────────
[sources.cowrie_file]
type       = "file"
include    = ["${COWRIE_LOG_PATH}"]
read_from  = "end"           # skip history on first run; offset persists after that
fingerprint.strategy = "device_and_inode"   # handles log rotation correctly

# ── Transform: parse each line as JSON ─────────────────────────────────────
[transforms.parse_event]
type          = "remap"
inputs        = ["cowrie_file"]
drop_on_error = true          # discard malformed lines silently
source        = '''
  . = parse_json!(string!(.message))
  .sensor = "${SENSOR_ID}"
'''

# ── Sink: publish each event to Kafka ─────────────────────────────────────
# Each event becomes one Kafka message (no array wrapping).
[sinks.kafka]
type              = "kafka"
inputs            = ["parse_event"]
bootstrap_servers = "${KAFKA_BROKERS}"
topic             = "honeypot.cowrie"
encoding.codec    = "json"

# Disk buffer — survives broker downtime without dropping events
[sinks.kafka.buffer]
type      = "disk"
max_size  = 268435488     # Vector 0.40 minimum disk buffer size
when_full = "block"       # back-pressure instead of dropping

# ── Sink: POST batches to ingest-api (HTTP fallback — disabled) ────────────
# To roll back: uncomment everything below and comment out [sinks.kafka] above.
# Also re-add INGEST_API_URL and INGEST_SHARED_SECRET to the vector env in compose.
#
# [sinks.ingest_api]
# type    = "http"
# inputs  = ["parse_event"]
# uri     = "INGEST_API_URL_PLACEHOLDER/ingest/cowrie/vector"
# method  = "post"
# encoding.codec = "json"
#
# [sinks.ingest_api.batch]
# max_events   = 100
# timeout_secs = 2
#
# [sinks.ingest_api.request]
# headers.Content-Type   = "application/json"
# headers.X-Ingest-Token = "INGEST_SHARED_SECRET_PLACEHOLDER"
# timeout_secs               = 20
# retry_attempts             = 360
# retry_initial_backoff_secs = 1
# retry_max_duration_secs    = 10
#
# [sinks.ingest_api.buffer]
# type      = "disk"
# max_size  = 268435488
# when_full = "block"
