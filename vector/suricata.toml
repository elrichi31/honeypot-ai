# vector/suricata.toml — Suricata EVE JSON alert shipper
#
# Tails /var/log/suricata/eve.json, filters alert events,
# and publishes each alert to Kafka (topic: honeypot.suricata).
#
# Environment variables (required):
#   SURICATA_SENSOR_ID — sensor identifier (e.g. suricata-01)
#   KAFKA_BROKERS      — Kafka bootstrap servers (e.g. kafka:9092)
#
# ROLLBACK: to revert to HTTP ingestion, comment out [sinks.kafka] and its
# sub-tables, then uncomment [sinks.suricata_ingest] and all its sub-tables below.
# Also re-add INGEST_API_URL and INGEST_SHARED_SECRET to the vector env.

# ── Source: tail Suricata EVE JSON ─────────────────────────────────────────
[sources.suricata_eve]
type       = "file"
include    = ["/tmp/suricata-logs/eve.json"]
read_from  = "end"
fingerprint.strategy = "device_and_inode"

# ── Transform: parse JSON and filter to alerts only ─────────────────────────
[transforms.parse_suricata]
type          = "remap"
inputs        = ["suricata_eve"]
drop_on_error = true
source        = '''
  . = parse_json!(string!(.message))
  # Drop non-alert events (flows, dns, http, stats...)
  if .event_type != "alert" {
    abort
  }
  .sensor_id = "${SURICATA_SENSOR_ID}"
'''

# ── Sink: publish each alert to Kafka ──────────────────────────────────────
# Each alert becomes one Kafka message (no array wrapping).
[sinks.kafka]
type              = "kafka"
inputs            = ["parse_suricata"]
bootstrap_servers = "${KAFKA_BROKERS}"
topic             = "honeypot.suricata"
encoding.codec    = "json"

# Disk buffer — survives broker downtime without dropping events
[sinks.kafka.buffer]
type      = "disk"
max_size  = 268435488     # Vector 0.40 minimum disk buffer size
when_full = "block"       # back-pressure instead of dropping

# ── Sink: POST batches to ingest-api (HTTP fallback — disabled) ────────────
# To roll back: uncomment everything below and comment out [sinks.kafka] above.
# Also re-add INGEST_API_URL and INGEST_SHARED_SECRET to the vector env.
#
# [sinks.suricata_ingest]
# type    = "http"
# inputs  = ["parse_suricata"]
# uri     = "INGEST_API_URL_PLACEHOLDER/ingest/suricata/alert"
# method  = "post"
# encoding.codec = "json"
#
# [sinks.suricata_ingest.batch]
# max_events   = 50
# timeout_secs = 5
#
# [sinks.suricata_ingest.request]
# headers.Content-Type   = "application/json"
# headers.X-Ingest-Token = "INGEST_SHARED_SECRET_PLACEHOLDER"
# timeout_secs               = 20
# retry_attempts             = 360
# retry_initial_backoff_secs = 1
# retry_max_duration_secs    = 10
#
# [sinks.suricata_ingest.buffer]
# type      = "disk"
# max_size  = 268435488
# when_full = "block"
