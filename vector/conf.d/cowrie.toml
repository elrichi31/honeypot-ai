# vector/conf.d/cowrie.toml â€” Cowrie log shipper
#
# Tails cowrie.json, parses each JSON line, and publishes each event to Kafka.
# Persists read offset to disk â†’ survives container restarts without losing events.
# Buffers to disk when the broker is unreachable â†’ no events dropped on downtime.
#
# Environment variables (required):
#   COWRIE_LOG_PATH â€” path to cowrie.json inside the container
#   KAFKA_BROKERS   â€” Kafka bootstrap servers (e.g. kafka:9092)
#
# ROLLBACK: to revert to HTTP ingestion, comment out [sinks.cowrie_kafka] and
# its sub-tables, then uncomment [sinks.cowrie_ingest_api] and all its
# sub-tables below.

data_dir = "/var/lib/vector"

[sources.cowrie_file]
type       = "file"
include    = ["${COWRIE_LOG_PATH}"]
read_from  = "end"           # skip history on first run; offset persists after that
fingerprint.strategy = "device_and_inode"   # handles log rotation correctly

[transforms.parse_cowrie_event]
type          = "remap"
inputs        = ["cowrie_file"]
drop_on_error = true          # discard malformed lines silently
source        = '''
  . = parse_json!(string!(.message))
  .sensor = "${SENSOR_ID}"
'''

[sinks.cowrie_kafka]
type              = "kafka"
inputs            = ["parse_cowrie_event"]
bootstrap_servers = "${KAFKA_BROKERS}"
topic             = "honeypot.cowrie"
encoding.codec    = "json"

[sinks.cowrie_kafka.buffer]
type      = "disk"
max_size  = 268435488     # Vector 0.40 minimum disk buffer size
when_full = "block"       # back-pressure instead of dropping

