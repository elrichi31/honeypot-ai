# vector/conf.d/suricata.toml â€” Suricata EVE JSON alert shipper
#
# Tails /var/log/suricata/eve.json, filters alert events,
# and publishes each alert to Kafka (topic: honeypot.suricata).
#
# Environment variables (required):
#   SURICATA_SENSOR_ID â€” sensor identifier (e.g. suricata-01)
#   KAFKA_BROKERS      â€” Kafka bootstrap servers (e.g. kafka:9092)
#
# ROLLBACK: to revert to HTTP ingestion, comment out [sinks.suricata_kafka] and
# its sub-tables, then uncomment [sinks.suricata_ingest] and all its sub-tables
# below.

[sources.suricata_eve]
type       = "file"
include    = ["/tmp/suricata-logs/eve.json"]
read_from  = "end"
fingerprint.strategy = "device_and_inode"

[transforms.parse_suricata]
type          = "remap"
inputs        = ["suricata_eve"]
drop_on_error = true
source        = '''
  . = parse_json!(string!(.message))
  # Drop non-alert events (flows, dns, http, stats...)
  if .event_type != "alert" {
    abort
  }
  .sensor_id = "${SURICATA_SENSOR_ID}"
'''

[sinks.suricata_kafka]
type              = "kafka"
inputs            = ["parse_suricata"]
bootstrap_servers = "${KAFKA_BROKERS}"
topic             = "honeypot.suricata"
encoding.codec    = "json"

[sinks.suricata_kafka.buffer]
type      = "disk"
max_size  = 268435488
when_full = "block"

