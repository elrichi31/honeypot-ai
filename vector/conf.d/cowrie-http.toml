# cowrie-http.toml — usado en deploys sin Kafka (single-host prod).
# En docker-compose.prod.single-host.yml, montar este archivo sobre cowrie.toml:
#   - ./vector/conf.d/cowrie-http.toml:/etc/vector/conf.d/cowrie.toml:ro
#
# Diferencia con cowrie.toml: sink HTTP hacia ingest-api en lugar de Kafka.

data_dir = "/var/lib/vector"

[sources.cowrie_file]
type       = "file"
include    = ["${COWRIE_LOG_PATH}"]
read_from  = "end"
fingerprint.strategy = "device_and_inode"

[transforms.parse_cowrie_event]
type          = "remap"
inputs        = ["cowrie_file"]
drop_on_error = true
source        = '''
  . = parse_json!(string!(.message))
  .sensor = "${SENSOR_ID}"
'''

[sinks.cowrie_ingest_api]
type           = "http"
inputs         = ["parse_cowrie_event"]
uri            = "${INGEST_API_URL}/ingest/cowrie/vector"
method         = "post"
encoding.codec = "json"

[sinks.cowrie_ingest_api.batch]
max_events   = 100
timeout_secs = 2

[sinks.cowrie_ingest_api.request]
headers.Content-Type   = "application/json"
headers.X-Ingest-Token = "${INGEST_SHARED_SECRET}"
timeout_secs               = 20
retry_attempts             = 360
retry_initial_backoff_secs = 1
retry_max_duration_secs    = 10

[sinks.cowrie_ingest_api.buffer]
type      = "disk"
max_size  = 268435488
when_full = "block"
