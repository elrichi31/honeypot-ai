# cowrie.cfg — Custom configuration for the honeypot
# Only overrides relevant defaults. Full reference: cowrie.cfg.dist inside the container.

[honeypot]
# Hostname displayed in the fake shell prompt and returned by `hostname`
hostname = web-prod-01

# Paths (relative to cowrie root, keep defaults so the container works)
log_path            = var/log/cowrie
download_path       = var/lib/cowrie/downloads
share_path          = share/cowrie
state_path          = var/lib/cowrie
etc_path            = etc
contents_path       = honeyfs
txtcmds_path        = txtcmds

# Record full TTY sessions (replayed in some analysis tools)
ttylog              = true
ttylog_path         = var/lib/cowrie/tty

# How long an idle session stays open (seconds)
interactive_timeout = 300
# How long to wait for auth before closing
authentication_timeout = 120

# -------------------------------------------------------------------------
# Shell emulation — controls what uname / /proc/version return
# -------------------------------------------------------------------------
[shell]
# Kernel reported by `uname -r`
kernel_version       = 5.15.0-91-generic
# Reported by `uname -v`  (visible in `uname -s -v -n -r -m`)
kernel_build_string  = #101-Ubuntu SMP Tue Nov 14 13:30:08 UTC 2023
# Reported by `uname -m`
hardware_platform    = x86_64
operating_system     = GNU/Linux

# -------------------------------------------------------------------------
# SSH service
# -------------------------------------------------------------------------
[ssh]
enabled         = true
listen_endpoints = tcp:2222:interface=0.0.0.0

# Version string sent during the SSH handshake.
# Attackers fingerprint servers by this string — Ubuntu 22.04 LTS is common.
version         = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6

# Accept public-key auth attempts (records the key, never actually works)
pub_key_auth    = true

# Reject auth-none so the session cant skip straight past authentication
auth_none_enabled = false

# -------------------------------------------------------------------------
# JSON log output (consumed by log-puller)
# -------------------------------------------------------------------------
[output_jsonlog]
enabled   = true
logfile   = var/log/cowrie/cowrie.json
# ISO timestamps (easier to parse downstream)
epoch_timestamp = false
