%YAML 1.1
---
# Falco config for honeypot platform
# Uses modern eBPF driver (kernel >= 5.8, BTF required — check: test -f /sys/kernel/btf/vmlinux)
# JSON output to file — Vector tails it and ships alerts to ingest-api

engine:
  kind: modern_ebpf

container_engines:
  docker:
    enabled: true
    socket: /host/var/run/docker.sock

json_output: true
json_include_output_property: true
json_include_tags_property: true

log_stderr: true
log_syslog: false
log_level: info

file_output:
  enabled: true
  keep_alive: true
  filename: /var/log/falco/falco.json

stdout_output:
  enabled: true

# Default rule files bundled in the image
rules_files:
  - /etc/falco/falco_rules.yaml
  - /etc/falco/falco_rules.local.yaml
