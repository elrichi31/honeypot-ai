# Protocol honeypots share one Vector config so any incremental install can
# refresh the same protocol.toml in vector/conf.d.

[sources.protocol_files]
type       = "file"
include    = [
  "${PORT_LOG_PATH}",
  "${MYSQL_LOG_PATH}",
  "${FTP_LOG_PATH}",
  "${SMB_LOG_PATH}",
]
read_from  = "end"
fingerprint.strategy = "device_and_inode"

[transforms.parse_protocol]
type          = "remap"
inputs        = ["protocol_files"]
drop_on_error = true
source        = '''
  . = parse_json!(string!(.message))
'''

[sinks.protocol_ingest]
type           = "http"
inputs         = ["parse_protocol"]
uri            = "${INGEST_API_URL}/ingest/protocol/event"
method         = "post"
encoding.codec = "json"

[sinks.protocol_ingest.batch]
max_events   = 50
timeout_secs = 2

[sinks.protocol_ingest.request]
headers.Content-Type  = "application/json"
headers.X-Ingest-Token = "${INGEST_SHARED_SECRET}"
retry_attempts = 360
retry_initial_backoff_secs = 1
retry_max_duration_secs = 10

[sinks.protocol_ingest.buffer]
type      = "disk"
max_size  = 268435488
when_full = "block"
