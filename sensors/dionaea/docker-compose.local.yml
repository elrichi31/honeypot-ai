x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true

services:
  dionaea:
    <<: *service-defaults
    image: ghcr.io/telekom-security/dionaea:24.04.1
    container_name: dionaea-local
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "2021:21"
      - "2042:42"
      - "28081:81"
      - "2135:135"
      - "2445:445"
      - "21433:1433"
      - "21723:1723"
      - "21883:1883"
      - "3308:3306"
      - "2069:69/udp"
    volumes:
      - dionaea_local_var:/opt/dionaea/var/lib/dionaea
      - ./dionaea.cfg:/opt/dionaea/etc/dionaea/dionaea.cfg:ro
      - ./log_json.yaml:/opt/dionaea/etc/dionaea/ihandlers/log_json.yaml:ro
      - ./services-enabled:/opt/dionaea/etc/dionaea/services-enabled:ro
    pids_limit: 256

  dionaea-shipper:
    <<: *service-defaults
    image: python:3.12-alpine
    container_name: dionaea-shipper-local
    depends_on:
      - dionaea
    environment:
      INGEST_API_URL: ${INGEST_API_URL:-http://host.docker.internal:3000}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      SENSOR_ID: ${SENSOR_ID_DIONAEA:-dionaea-local-01}
      SENSOR_NAME: ${SENSOR_NAME_DIONAEA:-Dionaea Local Sensor}
      SENSOR_PROTOCOL: dionaea
      SENSOR_VERSION: ${SENSOR_VERSION_DIONAEA:-dionaea}
      SENSOR_IP: ${SENSOR_IP_DIONAEA:-}
      SENSOR_HOST: dionaea
      SENSOR_PORTS: "2021 2042 2135 2445 21433 21723 21883 3308 28081"
      SENSOR_PROBE_PORTS: "21 42 135 445 1433 1723 1883 3306 81"
      DIONAEA_LOG_PATH: /opt/dionaea/var/lib/dionaea/dionaea.json
      DIONAEA_OFFSET_FILE: /state/dionaea.offset
      READ_FROM_END: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - dionaea_local_var:/opt/dionaea/var/lib/dionaea:ro
      - dionaea_local_shipper_state:/state
      - ./shipper.py:/shipper.py:ro
    command: ["python3", "/shipper.py"]
    pids_limit: 64

volumes:
  dionaea_local_var:
  dionaea_local_shipper_state:
