- name: http
  config:
    root: "/opt/dionaea/var/lib/dionaea/http/root"
    ports:
      - 81
    ssl_ports:
      - 443
    max_request_size: 32768
    global_headers:
      - ["Server", "nginx"]
    headers:
      - filename_pattern: ".*\\.php"
        headers:
          - ["Content-Type", "text/html; charset=utf-8"]
          - ["Content-Length", "{content_length}"]
          - ["Connection", "{connection}"]
          - ["X-Powered-By", "PHP/5.6"]
