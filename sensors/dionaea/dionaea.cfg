[dionaea]
download.dir=/opt/dionaea/var/lib/dionaea/binaries/
modules=curl,python,emu
# streamdumper (bistreams) intentionally disabled: it dumps a raw traffic
# capture for EVERY accepted connection, which under attack volume fills the
# disk with millions of tiny files (tens of GB). All actionable intelligence
# (credentials, src IPs, events) already flows to the DB via the log_json
# ihandler, so bistreams add disk pressure without analytical value. To
# re-enable, add `filter_streamdumper` back here and uncomment its blocks below.
processors=filter_emu

listen.mode=getifaddrs
# listen.addresses=127.0.0.1
# listen.interfaces=eth0,tap0

# Country
ssl.default.c=AU
# Common Name/domain name
ssl.default.cn=Some-State
# Organization
ssl.default.o=Internet Widgits Pty Ltd
# Organizational Unit
ssl.default.ou=

[logging]
default.filename=/opt/dionaea/var/log/dionaea/dionaea.log
default.levels=warning,error
default.domains=*

errors.filename=/opt/dionaea/var/log/dionaea/dionaea-errors.log
errors.levels=warning,error
errors.domains=*

# Disabled — see note under [dionaea].processors. Re-enable both blocks (and add
# filter_streamdumper back to processors=) only if you specifically need raw
# per-connection traffic dumps and have the disk budget for them.
# [processor.filter_streamdumper]
# name=filter
# config.allow.0.types=accept
# config.allow.1.types=connect
# config.allow.1.protocols=ftpctrl
# config.deny.0.protocols=ftpdata,ftpdatacon,xmppclient
# next=streamdumper
#
# [processor.streamdumper]
# name=streamdumper
# config.path=/opt/dionaea/var/lib/dionaea/bistreams/%Y-%m-%d/

[processor.filter_emu]
name=filter
config.allow.0.protocols=smbd,epmapper,nfqmirrord,mssqld
next=emu

[processor.emu]
name=emu
config.limits.files=3
#512 * 1024
config.limits.filesize=524288
config.limits.sockets=3
config.limits.sustain=120
config.limits.idle=30
config.limits.listen=30
config.limits.cpu=120
#// 1024 * 1024 * 1024
config.limits.steps=1073741824

[module.nl]
# set to yes in case you are interested in the mac address of the remote (only works for lan)
lookup_ethernet_addr=yes

[module.python]
imports=dionaea.log,dionaea.services,dionaea.ihandlers
sys_paths=default
service_configs=/opt/dionaea/etc/dionaea/services-enabled/*.yaml
ihandler_configs=/opt/dionaea/etc/dionaea/ihandlers/log_json.yaml,/opt/dionaea/etc/dionaea/ihandlers/emu_scripts.yaml
