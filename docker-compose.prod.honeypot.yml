services:
  cowrie:
    image: cowrie/cowrie:latest
    container_name: cowrie
    restart: unless-stopped
    ports:
      - "22:2222"     # SSH honeypot — visible en port scan
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var

  web-honeypot:
    image: ${WEB_HONEYPOT_IMAGE:-honeypot-web-honeypot}
    container_name: web-honeypot
    restart: unless-stopped
    environment:
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
      PORT: "8080"
    ports:
      - "80:8080"     # HTTP honeypot — mismo host que SSH, sale en port scan
      - "8443:8080"   # también en 8443 para atrapar scans de puertos alternativos

volumes:
  cowrie_var:
