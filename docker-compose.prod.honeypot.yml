x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  cowrie:
    <<: *service-defaults
    build:
      context: ./cowrie
    container_name: cowrie
    ports:
      - "22:2222"     # SSH honeypot — visible en port scan publico
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var
      - ./cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./cowrie/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro
    networks:
      - edge
    pids_limit: 256

  cowrie-beacon:
    <<: *service-defaults
    image: python:3.12-alpine
    container_name: cowrie-beacon
    environment:
      SENSOR_ID: ${SENSOR_ID_SSH:-cowrie-ssh-01}
      SENSOR_NAME: SSH Honeypot (Cowrie)
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_PROTOCOL: ssh
      SENSOR_VERSION: cowrie
      SENSOR_PORTS: "22"
      SENSOR_PROBE_PORTS: "2222"
      SENSOR_HOST: cowrie
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
    volumes:
      - ./cowrie/heartbeat.py:/heartbeat.py:ro
    command: ["python3", "/heartbeat.py"]
    networks:
      - edge
    pids_limit: 16

  web-honeypot:
    <<: *service-defaults
    build:
      context: ./apps/web-honeypot
    container_name: web-honeypot
    environment:
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "8080"
      SENSOR_ID: ${SENSOR_ID_HTTP:-web-01}
      SENSOR_NAME: Web Honeypot
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_HOST: web-honeypot
      SENSOR_PORTS: "80 8443"
      SENSOR_PROBE_PORTS: "8080 8080"
    ports:
      - "80:8080"
      - "8443:8080"
    read_only: true
    networks:
      - edge
    tmpfs:
      - /tmp
    pids_limit: 128

  vector:
    <<: *service-defaults
    image: timberio/vector:0.40.0-alpine
    container_name: vector
    depends_on:
      - cowrie
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var:ro
      - ./vector/cowrie.toml:/etc/vector/vector.toml:ro
      - vector_data:/var/lib/vector
    command: ["--config", "/etc/vector/vector.toml"]
    environment:
      COWRIE_LOG_PATH: /cowrie/cowrie-git/var/log/cowrie/cowrie.json
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
    networks:
      - edge
    pids_limit: 128

  ftp-honeypot:
    <<: *service-defaults
    build:
      context: ./apps/ftp-honeypot
    container_name: ftp-honeypot
    environment:
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "21"
      DST_PORT: "21"
      SENSOR_ID: ${SENSOR_ID_FTP:-ftp-01}
      SENSOR_NAME: FTP Honeypot
      SENSOR_IP: ${HONEYPOT_IP:-}
    ports:
      - "21:21"
    networks:
      - edge
    pids_limit: 128

  mysql-honeypot:
    <<: *service-defaults
    build:
      context: ./apps/mysql-honeypot
    container_name: mysql-honeypot
    environment:
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "3306"
      DST_PORT: "3306"
      SENSOR_ID: ${SENSOR_ID_MYSQL:-mysql-01}
      SENSOR_NAME: MySQL Honeypot
      SENSOR_IP: ${HONEYPOT_IP:-}
    ports:
      - "3306:3306"
    networks:
      - edge
    pids_limit: 128

  port-honeypot:
    <<: *service-defaults
    build:
      context: ./apps/port-honeypot
    container_name: port-honeypot
    environment:
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORTS: "1433 2375 3389 4444 5900 6379 8888 9090 9200 27017"
      SENSOR_ID: ${SENSOR_ID_PORT:-port-01}
      SENSOR_NAME: Port Honeypot
      SENSOR_IP: ${HONEYPOT_IP:-}
    ports:
      - "1433:1433"
      - "2375:2375"
      - "3389:3389"
      - "4444:4444"
      - "5900:5900"
      - "6379:6379"
      - "8888:8888"
      - "9090:9090"
      - "9200:9200"
      - "27017:27017"
    networks:
      - edge
    pids_limit: 256

volumes:
  cowrie_var:
  vector_data:

networks:
  edge:
    driver: bridge
