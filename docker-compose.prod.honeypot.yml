x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  cowrie:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./sensors/cowrie
    container_name: cowrie
    # cowrie starts as root to apply config, then drops to the `cowrie` user
    # (it refuses to run as root). cap_drop:ALL from the defaults removes
    # CAP_SETUID/SETGID, so re-add them or the privilege drop fails.
    cap_add:
      - SETUID
      - SETGID
    ports:
      - "22:2222"     # SSH honeypot — visible en port scan publico
      - "2222:2222"   # Alternate testing port for networks that block outbound 22
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var
      - ./sensors/cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./sensors/cowrie/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro
    networks:
      - edge
    pids_limit: 256

  cowrie-beacon:
    <<: *service-defaults
    logging: *json-logging
    image: python:3.12-alpine
    container_name: cowrie-beacon
    environment:
      SENSOR_ID: ${SENSOR_ID_SSH:-cowrie-ssh-01}
      SENSOR_NAME: SSH Honeypot (Cowrie)
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_PROTOCOL: ssh
      SENSOR_VERSION: cowrie
      SENSOR_PORTS: "22 2222"
      SENSOR_PROBE_PORTS: "2222 2222"
      SENSOR_HOST: cowrie
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
    volumes:
      - ./sensors/cowrie/heartbeat.py:/heartbeat.py:ro
    command: ["python3", "/heartbeat.py"]
    networks:
      - edge
    pids_limit: 16

  web-honeypot:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./sensors/web-honeypot
    container_name: web-honeypot
    environment:
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "8080"
      SENSOR_ID: ${SENSOR_ID_HTTP:-web-01}
      SENSOR_NAME: Web Honeypot
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_HOST: web-honeypot
      SENSOR_PORTS: "80 8443"
      SENSOR_PROBE_PORTS: "8080 8080"
      EVENT_LOG_PATH: /var/log/web-honeypot/events.json
    ports:
      - "80:8080"
      - "8443:8080"
    read_only: true
    networks:
      - edge
    tmpfs:
      - /tmp
    volumes:
      - web_events:/var/log/web-honeypot
    pids_limit: 128

  suricata:
    logging: *json-logging
    build:
      context: ./sensors/suricata
    container_name: suricata
    restart: unless-stopped
    init: true
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
      - SETPCAP   # capng_change_id needs this to drop privileges internally
      - SETUID
      - SETGID
    environment:
      SURICATA_INTERFACE: ${SURICATA_INTERFACE:-eth0}
    volumes:
      - suricata_logs:/tmp/suricata-logs
    pids_limit: 256

  vector:
    <<: *service-defaults
    logging: *json-logging
    image: timberio/vector:0.40.0-alpine
    container_name: vector
    depends_on:
      - cowrie
      - suricata
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var:ro
      - suricata_logs:/tmp/suricata-logs:ro
      - galah_events:/var/log/galah:ro
      - web_events:/var/log/web-honeypot:ro
      - ftp_events:/var/log/ftp-honeypot:ro
      - mysql_events:/var/log/mysql-honeypot:ro
      - port_events:/var/log/port-honeypot:ro
      - smb_events:/var/log/smb-honeypot:ro
      - ./vector/conf.d:/etc/vector/conf.d
      - vector_data:/var/lib/vector
    command: ["--config-dir", "/etc/vector/conf.d/"]
    environment:
      COWRIE_LOG_PATH: /cowrie/cowrie-git/var/log/cowrie/cowrie.json
      SENSOR_ID: ${SENSOR_ID_SSH:-cowrie-ssh-01}
      SURICATA_SENSOR_ID: ${SENSOR_ID_SURICATA:-suricata-01}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      GALAH_LOG_PATH: /var/log/galah/galah.json
      WEB_LOG_PATH: /var/log/web-honeypot/events.json
      FTP_LOG_PATH: /var/log/ftp-honeypot/events.json
      MYSQL_LOG_PATH: /var/log/mysql-honeypot/events.json
      PORT_LOG_PATH: /var/log/port-honeypot/events.json
      SMB_LOG_PATH: /var/log/smb-honeypot/events.json
    networks:
      - edge
    pids_limit: 128

  ftp-honeypot:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./sensors/ftp-honeypot
    container_name: ftp-honeypot
    environment:
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "21"
      DST_PORT: "21"
      SENSOR_ID: ${SENSOR_ID_FTP:-ftp-01}
      SENSOR_NAME: FTP Honeypot
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
      EVENT_LOG_PATH: /var/log/ftp-honeypot/events.json
    ports:
      - "21:21"
    volumes:
      - ftp_events:/var/log/ftp-honeypot
    networks:
      - edge
    pids_limit: 128

  mysql-honeypot:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./sensors/mysql-honeypot
    container_name: mysql-honeypot
    environment:
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "3306"
      DST_PORT: "3306"
      SENSOR_ID: ${SENSOR_ID_MYSQL:-mysql-01}
      SENSOR_NAME: MySQL Honeypot
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
      EVENT_LOG_PATH: /var/log/mysql-honeypot/events.json
    ports:
      - "3306:3306"
    volumes:
      - mysql_events:/var/log/mysql-honeypot
    networks:
      - edge
    pids_limit: 128

  port-honeypot:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./sensors/port-honeypot
    container_name: port-honeypot
    environment:
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORTS: "1433 2375 3389 4444 5900 6379 8888 9090 9200 27017"
      SENSOR_ID: ${SENSOR_ID_PORT:-port-01}
      SENSOR_NAME: Port Honeypot
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
      EVENT_LOG_PATH: /var/log/port-honeypot/events.json
    volumes:
      - port_events:/var/log/port-honeypot
    ports:
      - "1433:1433"
      - "2375:2375"
      - "3389:3389"
      - "4444:4444"
      - "5900:5900"
      - "6379:6379"
      - "8888:8888"
      - "9090:9090"
      - "9200:9200"
      - "27017:27017"
    networks:
      - edge
    pids_limit: 256

  smb-honeypot:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./sensors/smb-honeypot
    container_name: smb-honeypot
    environment:
      INGEST_API_URL: ${INGEST_API_URL}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      PORT: "445"
      DST_PORT: "445"
      SENSOR_ID: ${SENSOR_ID_SMB:-smb-01}
      SENSOR_NAME: SMB Honeypot
      CLIENT_SLUG: ${CLIENT_SLUG:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
      SENSOR_IP: ${HONEYPOT_IP:-}
      SENSOR_HOST: smb-honeypot
      SMB_SHARE_NAME: ${SMB_SHARE_NAME:-ADMIN$}
      SMB_SHARE_COMMENT: ${SMB_SHARE_COMMENT:-TechCorp Remote Admin}
      SMB_SERVER_NAME: ${SMB_SERVER_NAME:-FS-TECHCORP-01}
      SMB_SERVER_OS: ${SMB_SERVER_OS:-Windows Server 2022 Standard}
      SMB_SERVER_DOMAIN: ${SMB_SERVER_DOMAIN:-TECHCORP}
      SMB_SHARE_PATH: /share
      SMB_CAPTURE_DIR: /captures
      EVENT_LOG_PATH: /var/log/smb-honeypot/events.json
    ports:
      - "445:445"
    volumes:
      - smb_share:/share
      - smb_captures:/captures
      - smb_events:/var/log/smb-honeypot
    networks:
      - edge
    # NET_BIND_SERVICE to bind port 445 (<1024) as non-root
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 128

volumes:
  cowrie_var:
  vector_data:
  suricata_logs:
  galah_events:
  smb_share:
  smb_captures:
  web_events:
  ftp_events:
  mysql_events:
  port_events:
  smb_events:

networks:
  edge:
    driver: bridge
