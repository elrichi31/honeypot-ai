x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# Platform-only stack: dashboard + ingest-api + postgres + replica + kafka.
# Honeypots run separately on sensor servers (docker-compose.prod.honeypot.yml).
#
# Ports:
#   3000 → ingest-api  (public  — sensors connect from outside)
#   4000 → dashboard   (internal — access via SSH tunnel only)
#
# SSH tunnel: ssh -L 4000:127.0.0.1:4000 -p <PORT> <user>@<ip>

services:
  postgres:
    logging: *json-logging
    image: postgres:16-alpine
    container_name: honeypot-postgres
    restart: unless-stopped
    shm_size: 256mb
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=32MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c max_connections=50
      -c password_encryption=md5
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c wal_keep_size=4096MB
      -c hot_standby=on
      -c max_parallel_workers_per_gather=2
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: honeypot_prod
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
      REPLICATION_SLOT: ${REPLICATION_SLOT:-honeypot_replica_slot}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/postgres/primary-init-replication.sh:/docker-entrypoint-initdb.d/10-replication.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - db_private
    deploy:
      resources:
        limits:
          cpus: "2.0"

  postgres-replica:
    logging: *json-logging
    image: postgres:16-alpine
    container_name: honeypot-postgres-replica
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    user: postgres
    shm_size: 256mb
    entrypoint: ["sh", "/usr/local/bin/replica-entrypoint.sh"]
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=32MB
      -c effective_cache_size=1GB
      -c random_page_cost=1.1
      -c max_connections=50
      -c hot_standby=on
      -c max_parallel_workers_per_gather=2
    environment:
      PRIMARY_HOST: postgres
      PRIMARY_PORT: "5432"
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
      REPLICATION_SLOT: ${REPLICATION_SLOT:-honeypot_replica_slot}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
      - ./deploy/postgres/replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot -d honeypot_prod"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - db_private
    deploy:
      resources:
        limits:
          cpus: "1.5"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: honeypot-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 15
      SERVER_RESET_QUERY: ""
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    networks:
      - db_private
    deploy:
      resources:
        limits:
          cpus: "0.2"
          pids: 64

  redis:
    logging: *json-logging
    image: redis:7-alpine
    container_name: honeypot-redis
    restart: unless-stopped
    # noeviction is Redis's default and would reject writes once full; since
    # this is a pure query cache (every value is recomputable via withCache),
    # allkeys-lru lets it evict the least-recently-used entries instead.
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - db_private
    deploy:
      resources:
        limits:
          cpus: "0.5"

  kafka:
    <<: *service-defaults
    logging: *json-logging
    image: apache/kafka:3.8.0
    container_name: honeypot-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "zvlgl0xUR4uoTnaBlAnzEw"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - honeypot_ingest
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          pids: 256

  kafka-init:
    image: apache/kafka:3.8.0
    container_name: honeypot-kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - honeypot_ingest
    command: >
      bash -c "
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic honeypot.cowrie --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic honeypot.suricata --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic honeypot.web --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic honeypot.protocol --partitions 3 --replication-factor 1 &&
        echo 'Topics created.'
      "

  ingest-api:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./apps/ingest-api
      dockerfile: Dockerfile.compose
    container_name: ingest-api
    depends_on:
      postgres:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@pgbouncer:5432/honeypot_prod?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      REPLICA_DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres-replica:5432/honeypot_prod
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      CORS_ALLOWED_ORIGINS: ${BETTER_AUTH_URL:-http://localhost:4000}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      PORT: "3000"
      HOST: "0.0.0.0"
      SURICATA_OWN_IPS: ${SURICATA_OWN_IPS:-}
      # Platform-only: no local sensor dirs — malware list comes from DB only
      DIONAEA_BINARIES_PATH: /dev/null/no-local-sensors
      COWRIE_DOWNLOADS_PATH: /dev/null/no-local-sensors
      FTP_CAPTURES_PATH: /dev/null/no-local-sensors
    group_add:
      - "${DOCKER_GID:-110}"
    volumes:
      - dashboard_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test:
        [
          "CMD", "node", "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      - "3000:3000"
    networks:
      - honeypot_ingest
      - app_api
      - db_private
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.5"
          pids: 256

  dashboard:
    <<: *service-defaults
    logging: *json-logging
    build:
      context: ./apps/dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    container_name: honeypot-dashboard
    depends_on:
      ingest-api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      INTERNAL_API_URL: http://ingest-api:3000
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      DATABASE_URL: postgresql://honeypot:${POSTGRES_PASSWORD}@postgres:5432/honeypot_prod
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      BASE_VMDK_URL: ${BASE_VMDK_URL:-}
      SENSOR_INGEST_URL: ${SENSOR_INGEST_URL:-}
      HONEYPOT_IP: ${HONEYPOT_IP:-}
      HONEYPOT_SSH_PORT: ${HONEYPOT_SSH_PORT:-22}
      HONEYPOT_INGEST_PORT: ${HONEYPOT_INGEST_PORT:-8022}
      DASHBOARD_TIMEZONE: ${DASHBOARD_TIMEZONE:-UTC}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - dashboard_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test:
        [
          "CMD", "node", "-e",
          "fetch('http://127.0.0.1:4000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - app_api
      - db_private
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.0"
          pids: 256

volumes:
  pg_data:
  pg_replica_data:
  dashboard_data:
  kafka_data:

networks:
  honeypot_ingest:
    driver: bridge
  app_api:
    driver: bridge
  db_private:
    driver: bridge
